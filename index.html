ents\"><div><h1>PROACTIVE</h1><small>المنصة الاستباقية</small></div></div><div class=\"headline\"><h2>صفحة الدخول والصلاحيات</h2><p>دخول آمن، صلاحيات حسب الدور، وسجل تدقيق لكل إجراء داخل المنصة</p></div><div class=\"now\"><div class=\"pill\">مستخدمون نشطون <b>48</b></div><div class=\"pill\">أدوار معرفة <b>9</b></div><div class=\"pill\">جلسات اليوم <b>126</b></div></div></header>\n<aside class=\"glass side\"><div class=\"section-title\"><h3>أمان الوصول</h3><span class=\"badge b-purple\">Secure</span></div><div class=\"kpi blueline\"><small>جلسات اليوم</small><b>126</b><em>كلها مسجلة في سجل التدقيق</em></div><div class=\"kpi greenline\"><small>مصادقة ثنائية</small><b>مفعلة</b><em>للمشرفين والقيادة</em></div><div class=\"kpi yellowline\"><small>طلبات صلاحية</small><b>3</b><em>بانتظار اعتماد مدير النظام</em></div><div class=\"kpi redline\"><small>محاولات غير مكتملة</small><b>2</b><em>تم تسجيلها للمراجعة</em></div></aside>\n<main class=\"main\"><section class=\"glass login-card\"><div class=\"login-logo\">P</div><h2>تسجيل الدخول</h2><p>الوصول للمنصة حسب الصلاحية والدور التشغيلي</p><div class=\"field\">اسم المستخدم / البريد الإلكتروني</div><div class=\"field\">كلمة المرور</div><div class=\"field\">رمز التحقق الثنائي</div><button class=\"btn green\">دخول آمن</button><button class=\"btn ghost\" style=\"margin-top:8px\">طلب صلاحية مؤقتة</button></section><section class=\"glass box\"><h3>الأدوار والصلاحيات</h3><div class=\"roles\"><div class=\"role\"><div class=\"icon\">♛</div><div><b>القيادة التنفيذية</b><small>وصول شامل ومراجعة تقارير وقرارات</small></div><span class=\"badge b-purple\">كامل</span></div><div class=\"role\"><div class=\"icon\">▣</div><div><b>مدير المشروع</b><small>اعتماد، تصعيد، تقارير، ومهام</small></div><span class=\"badge b-blue\">إدارة</span></div><div class=\"role\"><div class=\"icon\">👥</div><div><b>مدير المنطقة</b><small>متابعة وتنفيذ داخل نطاقه</small></div><span class=\"badge b-green\">تشغيل</span></div><div class=\"role\"><div class=\"icon\">☑</div><div><b>الجودة والامتثال</b><small>أدلة، مراجعة، تقارير، وامتثال</small></div><span class=\"badge b-yellow\">مراجعة</span></div><div class=\"role\"><div class=\"icon\">◉</div><div><b>مشاهد</b><small>عرض فقط دون تعديل</small></div><span class=\"badge b-green\">قراءة</span></div></div><div class=\"permissions\"><div class=\"perm\"><b>الاعتماد</b>محدد للقيادة وغرفة العمليات</div><div class=\"perm\"><b>التعديل</b>حسب نطاق المسؤول</div><div class=\"perm\"><b>الإغلاق</b>بعد دليل واعتماد</div><div class=\"perm\"><b>التصدير</b>للتقارير المعتمدة فقط</div></div></section></main>\n<aside class=\"glass side\"><div class=\"section-title\"><h3>قرار الصفحة</h3><span class=\"badge b-yellow\">صلاحية</span></div><div class=\"kpi yellowline\"><small>الإجراء المقترح</small><b style=\"font-size:19px\">مراجعة 3 طلبات صلاحية قبل التفعيل</b><em>لتجنب وصول غير مبرر</em></div><p style=\"color:var(--muted);font-size:12px;line-height:1.7\">كل صلاحية جديدة تحتاج مبرر ونطاق ومدة، وتحفظ في سجل التدقيق.</p><div class=\"actions\"><button class=\"btn green\">مراجعة الطلبات</button><button class=\"btn ghost\">رفض الكل</button></div><div class=\"section-title\" style=\"margin-top:8px\"><h3>طلبات الصلاحية</h3></div><div class=\"row\"><span>مشرف حشود - مؤقت</span><span class=\"badge b-yellow\">مراجعة</span></div><div class=\"row\"><span>مسؤول تقارير - عرض فقط</span><span class=\"badge b-green\">مناسب</span></div><div class=\"row\"><span>مورد خارجي - دخول محدود</span><span class=\"badge b-red\">تحقق</span></div></aside>\n<section class=\"bottom\"><div class=\"glass\"><h3>دورة الدخول</h3><div class=\"steps\"><div class=\"step\"><b>1 تحقق</b>هوية المستخدم</div><div class=\"step\"><b>2 صلاحية</b>الدور والنطاق</div><div class=\"step\"><b>3 جلسة</b>سجل تدقيق</div></div></div><div class=\"glass\"><h3>مستويات الوصول</h3><div class=\"steps\"><div class=\"step\"><b>كامل</b>قيادة</div><div class=\"step\"><b>إدارة</b>مشروع</div><div class=\"step\"><b>تشغيل</b>مناطق</div><div class=\"step\"><b>قراءة</b>مشاهد</div></div></div><div class=\"glass\"><h3>الحماية</h3><div class=\"steps\"><div class=\"step\"><b>2FA</b>رمز تحقق</div><div class=\"step\"><b>Audit</b>سجل دائم</div><div class=\"step\"><b>Expiry</b>صلاحية مؤقتة</div></div></div></section></div></body></html>"},{"num":"20","title":"مصدر البيانات والجداول","html":"<!doctype html><html lang=\"ar\" dir=\"rtl\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><title>مصدر البيانات والجداول</title>\n<link href=\"https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap\" rel=\"stylesheet\">\n<style>\n:root{--bg:#030711;--panel:#071126;--glass:rgba(10,18,38,.74);--line:rgba(154,111,255,.25);--line2:rgba(255,255,255,.08);--ink:#f7f3ff;--muted:#aab4cf;--purple:#7B3DFF;--green:#25D68B;--gold:#E9C46A;--red:#ff5d73;--yellow:#ffce5a;--blue:#5aa9ff}\n*{box-sizing:border-box}html,body{margin:0;height:100%}body{background:radial-gradient(1200px 600px at 80% -10%,rgba(123,61,255,.16),transparent),var(--bg);color:var(--ink);font-family:'IBM Plex Sans Arabic',Tahoma,Arial,sans-serif;padding:18px 20px 26px}\nheader{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}\n.mk{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--purple),#b18bff);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px}\nh1{font-size:19px;margin:0}.sub{color:var(--muted);font-size:12px;margin-top:2px}\n.spacer{flex:1}\n.btn{border:1px solid var(--line2);background:rgba(5,10,23,.7);color:var(--ink);border-radius:12px;padding:9px 13px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}\n.btn:hover{border-color:rgba(123,61,255,.6)}\n.btn.green{background:rgba(37,214,139,.15);border-color:rgba(37,214,139,.4);color:#bff5dd}\n.btn.purple{background:rgba(123,61,255,.18);border-color:rgba(123,61,255,.5)}\n.btn.ghost{background:transparent}\n.btn.sm{padding:6px 10px;font-size:11.5px;border-radius:10px}\n.tabs{display:flex;gap:7px;flex-wrap:wrap;margin:6px 0 16px}\n.tab{border:1px solid var(--line2);background:rgba(5,10,23,.55);color:var(--muted);border-radius:11px;padding:8px 12px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer}\n.tab.active{background:rgba(123,61,255,.2);border-color:rgba(123,61,255,.55);color:#fff}\n.tab b{color:var(--green);font-weight:800;margin-inline-start:5px}\n.panel{background:var(--glass);border:1px solid var(--line);border-radius:18px;padding:16px;backdrop-filter:blur(10px)}\n.panel-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}\n.panel-head h2{font-size:15px;margin:0}.panel-head .desc{color:var(--muted);font-size:11.5px}\n.toolbar{display:flex;gap:7px;flex-wrap:wrap;margin-inline-start:auto}\n.tablewrap{overflow:auto;border:1px solid var(--line2);border-radius:14px}\ntable{border-collapse:collapse;width:100%;min-width:560px;font-size:12.5px}\nthead th{background:rgba(123,61,255,.12);color:#dcd2ff;text-align:right;padding:10px 11px;font-weight:700;white-space:nowrap;position:sticky;top:0;border-bottom:1px solid var(--line)}\ntbody td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle}\ntbody tr:hover{background:rgba(123,61,255,.06)}\ninput.cell{width:100%;min-width:90px;background:transparent;border:1px solid transparent;border-radius:8px;color:var(--ink);font-family:inherit;font-size:12.5px;padding:7px 8px;transition:.12s}\ninput.cell:hover{border-color:var(--line2)}\ninput.cell:focus{outline:none;border-color:rgba(123,61,255,.6);background:rgba(5,10,23,.6)}\n.delcol{width:38px;text-align:center}\n.del{border:1px solid rgba(255,93,115,.3);background:rgba(255,93,115,.12);color:#ffb3bf;border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:14px;line-height:1}\n.del:hover{background:rgba(255,93,115,.25)}\n.foot{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap}\n.count{color:var(--muted);font-size:12px}\n.note{margin-top:14px;color:var(--muted);font-size:11.5px;line-height:1.7;border-top:1px solid var(--line2);padding-top:12px}\n.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(40px);background:rgba(37,214,139,.16);border:1px solid rgba(37,214,139,.5);color:#bff5dd;padding:10px 18px;border-radius:14px;font-size:12.5px;font-weight:700;opacity:0;transition:.3s;pointer-events:none;z-index:50}\n.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}\n.hide{display:none!important}\ninput[type=file]{display:none}\n</style></head><body>\n<header>\n  <div class=\"mk\">P</div>\n  <div><h1>مصدر البيانات والجداول</h1><div class=\"sub\">الجداول التي تُرفع عليها البيانات — تحرير مباشر، استيراد CSV، وحفظ يظهر فورًا في لوحات المنصة</div></div>\n  <div class=\"spacer\"></div>\n  <button class=\"btn ghost sm\" id=\"importAll\">استيراد الكل (JSON)</button>\n  <button class=\"btn ghost sm\" id=\"exportAll\">تصدير الكل (JSON)</button>\n  <button class=\"btn green\" id=\"saveAll\">حفظ ونشر للوحات</button>\n</header>\n<div class=\"tabs\" id=\"tabs\"></div>\n<div class=\"panel\" id=\"panel\"></div>\n<div class=\"toast\" id=\"toast\">تم الحفظ</div>\n<input type=\"file\" id=\"csvFile\" accept=\".csv,text/csv\">\n<input type=\"file\" id=\"jsonFile\" accept=\".json,application/json\">\n<script>\nvar DB = Object.assign({units:[],zones:[],support:[],lessons:[],officialVisits:[],schoolVisits:[],reports:[],tasks:[]}, (window.__DB__||{}));\nvar SCHEMA = {\n  units:{label:\"الوحدات التشغيلية\",page:\"03 مركز قيادة الوحدات\",cols:[[\"code\",\"الكود\"],[\"unit\",\"الوحدة\"],[\"owner\",\"المسؤول\"],[\"priority\",\"الأولوية\"],[\"status\",\"الحالة\"],[\"updated\",\"آخر تحديث\"]]},\n  zones:{label:\"الإنذار المبكر للمناطق\",page:\"04 التنبيه المبكر\",cols:[[\"zone\",\"المنطقة\"],[\"indicator\",\"المؤشر\"],[\"probability\",\"الاحتمال %\"],[\"decision\",\"القرار\"]]},\n  support:{label:\"طلبات الدعم بين المناطق\",page:\"05 خطة دعم بين المناطق\",cols:[[\"dest\",\"الوجهة\"],[\"need\",\"المطلوب\"],[\"source\",\"المصدر\"],[\"deadline\",\"المهلة\"],[\"status\",\"الحالة\"]]},\n  lessons:{label:\"التحسينات اليومية\",page:\"08 مركز التحسين اليومي\",cols:[[\"title\",\"العنوان\"],[\"cause\",\"السبب الجذري\"],[\"action\",\"الإجراء التصحيحي\"],[\"recommendation\",\"التوصية\"],[\"rating\",\"التقييم (1-5)\"]]},\n  officialVisits:{label:\"الزيارات الرسمية\",page:\"09 جدول الزيارات الرسمية\",cols:[[\"time\",\"الوقت\"],[\"title\",\"الزيارة / الوفد\"],[\"route\",\"المسار\"],[\"status\",\"الحالة\"]]},\n  schoolVisits:{label:\"الزيارات المدرسية\",page:\"10 جدول الزيارات المدرسية\",cols:[[\"time\",\"الوقت\"],[\"school\",\"المدرسة\"],[\"students\",\"الطلاب\"],[\"supervisors\",\"المشرفون\"],[\"buses\",\"الحافلات\"],[\"hall\",\"المسار/القاعة\"],[\"status\",\"الحالة\"]]},\n  reports:{label:\"التقارير\",page:\"12 التقارير والحوكمة\",cols:[[\"name\",\"التقرير\"],[\"desc\",\"الوصف\"],[\"type\",\"الصيغة\"]]},\n  tasks:{label:\"المهام التشغيلية\",page:\"جدول إضافي للرفع\",cols:[[\"id\",\"المعرف\"],[\"task\",\"المهمة\"],[\"owner\",\"المسؤول\"],[\"track\",\"المسار\"],[\"due\",\"الاستحقاق\"],[\"status\",\"الحالة\"]]}\n};\nvar ORDER=[\"units\",\"zones\",\"support\",\"officialVisits\",\"schoolVisits\",\"lessons\",\"reports\",\"tasks\"];\nvar active=\"units\", dirty=false, csvTarget=null;\n\nfunction toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(function(){t.classList.remove('show')},1700);}\nfunction tabs(){var h='';ORDER.forEach(function(k){h+='<button class=\"tab'+(k===active?' active':'')+'\" data-k=\"'+k+'\">'+SCHEMA[k].label+'<b>'+(DB[k]||[]).length+'</b></button>';});document.getElementById('tabs').innerHTML=h;\n  [].forEach.call(document.querySelectorAll('.tab'),function(b){b.onclick=function(){active=b.getAttribute('data-k');renderPanel();};});}\nfunction esc(s){return String(s==null?'':s).replace(/\"/g,'&quot;').replace(/</g,'&lt;');}\nfunction renderPanel(){\n  var k=active,sc=SCHEMA[k],rows=DB[k]||[];\n  var h='<div class=\"panel-head\"><div><h2>'+sc.label+'</h2><div class=\"desc\">تظهر في صفحة: '+sc.page+'</div></div>'+\n    '<div class=\"toolbar\">'+\n    '<button class=\"btn purple sm\" id=\"addRow\">+ صف جديد</button>'+\n    '<button class=\"btn ghost sm\" id=\"impCsv\">استيراد CSV</button>'+\n    '<button class=\"btn ghost sm\" id=\"expCsv\">تصدير CSV</button>'+\n    '</div></div>';\n  h+='<div class=\"tablewrap\"><table><thead><tr>';\n  sc.cols.forEach(function(c){h+='<th>'+c[1]+'</th>';});\n  h+='<th class=\"delcol\"></th></tr></thead><tbody>';\n  if(!rows.length){h+='<tr><td colspan=\"'+(sc.cols.length+1)+'\" style=\"text-align:center;color:var(--muted);padding:22px\">لا توجد بيانات — أضف صفًا أو استورد ملف CSV</td></tr>';}\n  rows.forEach(function(r,ri){h+='<tr data-ri=\"'+ri+'\">';\n    sc.cols.forEach(function(c){h+='<td><input class=\"cell\" data-f=\"'+c[0]+'\" value=\"'+esc(r[c[0]])+'\"></td>';});\n    h+='<td class=\"delcol\"><button class=\"del\" title=\"حذف\">✕</button></td></tr>';});\n  h+='</tbody></table></div>';\n  h+='<div class=\"foot\"><span class=\"count\">'+rows.length+' صف</span></div>';\n  h+='<div class=\"note\"><b>كيف تُرفع البيانات:</b> حرّر أي خلية مباشرة، أو اضغط «استيراد CSV» لرفع ملف بنفس ترتيب الأعمدة (الصف الأول عناوين). بعد التعديل اضغط «حفظ ونشر للوحات» في الأعلى لتُحدّث الصفحات التشغيلية فورًا، وتُحفظ نسخة دائمة في المتصفح.</div>';\n  document.getElementById('panel').innerHTML=h;\n  document.getElementById('addRow').onclick=function(){var o={};sc.cols.forEach(function(c){o[c[0]]='';});DB[k].push(o);dirty=true;renderPanel();tabs();};\n  document.getElementById('expCsv').onclick=function(){exportCsv(k);};\n  document.getElementById('impCsv').onclick=function(){csvTarget=k;document.getElementById('csvFile').click();};\n  [].forEach.call(document.querySelectorAll('#panel .cell'),function(inp){inp.oninput=function(){var ri=+inp.closest('tr').getAttribute('data-ri');DB[k][ri][inp.getAttribute('data-f')]=inp.value;dirty=true;};});\n  [].forEach.call(document.querySelectorAll('#panel .del'),function(b){b.onclick=function(){var ri=+b.closest('tr').getAttribute('data-ri');DB[k].splice(ri,1);dirty=true;renderPanel();tabs();};});\n}\nfunction exportCsv(k){var sc=SCHEMA[k],rows=DB[k]||[];var head=sc.cols.map(function(c){return c[1];}).join(',');\n  var lines=rows.map(function(r){return sc.cols.map(function(c){var v=(r[c[0]]==null?'':String(r[c[0]]));if(/[\",\\n]/.test(v))v='\"'+v.replace(/\"/g,'\"\"')+'\"';return v;}).join(',');});\n  var csv='\\uFEFF'+head+'\\n'+lines.join('\\n');\n  parent.postMessage({type:'PROACTIVE_EXPORT',filename:k+'.csv',content:csv,mime:'text/csv;charset=utf-8'},'*');\n  toast('تم تجهيز ملف '+k+'.csv');}\nfunction parseCsv(text){text=text.replace(/^\\uFEFF/,'').replace(/\\r\\n?/g,'\\n');var rows=[],row=[],cur='',q=false;\n  for(var i=0;i<text.length;i++){var ch=text[i];\n    if(q){if(ch=='\"'){if(text[i+1]=='\"'){cur+='\"';i++;}else q=false;}else cur+=ch;}\n    else{if(ch=='\"')q=true;else if(ch==',' ){row.push(cur);cur='';}else if(ch=='\\n'){row.push(cur);rows.push(row);row=[];cur='';}else cur+=ch;}}\n  if(cur!==''||row.length){row.push(cur);rows.push(row);}return rows.filter(function(r){return r.some(function(c){return c.trim()!=='';});});}\ndocument.getElementById('csvFile').onchange=function(e){var f=e.target.files[0];if(!f)return;var rd=new FileReader();\n  rd.onload=function(){var k=csvTarget,sc=SCHEMA[k];var rows=parseCsv(rd.result);if(rows.length<1){toast('ملف فارغ');return;}\n    var body=rows.slice(1);DB[k]=body.map(function(r){var o={};sc.cols.forEach(function(c,ci){o[c[0]]=(r[ci]||'').trim();});return o;});\n    dirty=true;renderPanel();tabs();toast('تم استيراد '+DB[k].length+' صف إلى '+sc.label);};\n  rd.readAsText(f,'utf-8');e.target.value='';};\ndocument.getElementById('expCsv')&&0;\ndocument.getElementById('exportAll').onclick=function(){parent.postMessage({type:'PROACTIVE_EXPORT',filename:'proactive-data.json',content:JSON.stringify(DB,null,2),mime:'application/json'},'*');toast('تم تجهيز نسخة JSON كاملة');};\ndocument.getElementById('importAll').onclick=function(){document.getElementById('jsonFile').click();};\ndocument.getElementById('jsonFile').onchange=function(e){var f=e.target.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){try{var o=JSON.parse(rd.result);ORDER.forEach(function(k){if(Array.isArray(o[k]))DB[k]=o[k];});dirty=true;renderPanel();tabs();toast('تم استيراد كل الجداول');}catch(err){toast('ملف JSON غير صالح');}};rd.readAsText(f,'utf-8');e.target.value='';};\ndocument.getElementById('saveAll').onclick=function(){parent.postMessage({type:'PROACTIVE_DB',db:DB},'*');dirty=false;toast('تم الحفظ والنشر — البيانات الآن حيّة في كل اللوحات');};\nwindow.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();document.getElementById('saveAll').click();}});\ntabs();renderPanel();\n<\\/script></body></html>"},{"num":"21","title":"مركز قيادة تجربة الزائر الاستباقي","html":"<!doctype html>\n<html lang=\"ar\" dir=\"rtl\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>مركز قيادة تجربة الزائر الاستباقي</title>\n<link href=\"https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700;800;900&display=swap\" rel=\"stylesheet\">\n<style>\n:root{\n  --bg:#030711;--card:#0a1428;--line:rgba(255,255,255,.09);\n  --ink:#f7f3ff;--muted:#8a97b8;--purple:#7B3DFF;--purple2:#5c2edd;\n  --green:#25D68B;--green2:#1aad6e;--yellow:#FFD25E;--orange:#FF9F43;\n  --red:#FF4D67;--blue:#4CC9FF;--gold:#D7B15E;--teal:#00C9B1;\n}\n*{box-sizing:border-box;margin:0;padding:0}\nbody{background:radial-gradient(ellipse at 50% -10%,rgba(123,61,255,.28),transparent 40%),linear-gradient(180deg,#030711 0%,#060e20 100%);color:var(--ink);font-family:'IBM Plex Sans Arabic',Tahoma,sans-serif;min-height:100vh;overflow-x:hidden}\nbody::before{content:\"\";position:fixed;inset:0;background:url(\"data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h40v40H0z' fill='none'/%3E%3Cpath d='M0 .5h40M.5 0v40' stroke='rgba(255,255,255,.025)' stroke-width='.5'/%3E%3C/svg%3E\");pointer-events:none;z-index:0}\n\n/* LAYOUT */\n.app{position:relative;z-index:1;padding:16px;max-width:1920px;margin:0 auto;display:flex;flex-direction:column;gap:14px}\n\n/* GLASS PANEL */\n.panel{background:linear-gradient(160deg,rgba(15,26,54,.92),rgba(5,11,28,.96));border:1px solid var(--line);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.06);backdrop-filter:blur(16px);position:relative;overflow:hidden}\n.panel::before{content:\"\";position:absolute;inset:0;background:linear-gradient(135deg,rgba(123,61,255,.08) 0%,transparent 50%,rgba(76,201,255,.04) 100%);pointer-events:none}\n.card{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);border-radius:16px;position:relative;overflow:hidden}\n.card::before{content:\"\";position:absolute;top:0;right:0;left:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent)}\n\n/* TOPBAR */\n.topbar{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:12px;padding:14px 18px}\n.brand{display:flex;align-items:center;gap:10px}\n.brand-logo{width:42px;height:46px;border-radius:12px;background:linear-gradient(145deg,#7b3dff,#201057);display:grid;place-items:center;font-weight:900;font-size:19px;box-shadow:0 0 24px rgba(123,61,255,.45)}\n.brand-text h1{font-size:17px;font-weight:800;line-height:1.2}\n.brand-text small{color:var(--muted);font-size:10px}\n.page-title{text-align:center}\n.page-title h2{font-size:20px;font-weight:900}\n.page-title p{color:var(--muted);font-size:11px;margin-top:3px}\n.pills{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}\n.pill{padding:6px 10px;border-radius:10px;font-size:11px;font-weight:700;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--muted)}\n.pill b{color:var(--ink)}\n\n/* DAY STATUS HERO */\n.hero-grid{display:grid;grid-template-columns:1fr 220px;gap:12px}\n.hero-main{padding:18px 20px;display:flex;flex-direction:column;justify-content:space-between;gap:12px}\n.eyebrow{display:inline-flex;align-items:center;gap:7px;padding:5px 10px;border:1px solid rgba(215,177,94,.3);border-radius:999px;color:#f6d98d;background:rgba(215,177,94,.08);font-size:11px;font-weight:800}\n.eyebrow-dot{width:7px;height:7px;border-radius:50%;background:#f6d98d;animation:blink 2s infinite}\n@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}\n.hero-main h1{font-size:28px;font-weight:900;line-height:1.2;margin:8px 0 6px}\n.hero-main p{color:var(--muted);font-size:12px;line-height:1.8;max-width:680px}\n.day-meta{display:flex;gap:8px;flex-wrap:wrap}\n.day-seal{padding:6px 14px;border-radius:999px;font-size:11px;font-weight:900}\n.seal-warning{background:rgba(255,210,94,.14);color:#ffe07b;border:1px solid rgba(255,210,94,.25)}\n.seal-ok{background:rgba(37,214,139,.12);color:#62edb0;border:1px solid rgba(37,214,139,.25)}\n.seal-danger{background:rgba(255,77,103,.14);color:#ff8ca0;border:1px solid rgba(255,77,103,.25)}\n.seal-critical{background:rgba(255,77,103,.25);color:#ff4d67;border:1px solid rgba(255,77,103,.5);animation:pulse-border 1.4s infinite}\n@keyframes pulse-border{50%{box-shadow:0 0 0 4px rgba(255,77,103,.2)}}\n\n.hero-status{padding:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;border-right:1px solid var(--line)}\n.big-score{font-size:58px;font-weight:900;line-height:1;background:linear-gradient(135deg,#c4a4ff,#7b3dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.score-label{color:var(--muted);font-size:11px;line-height:1.5}\n.score-change{font-size:12px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:4px}\n\n/* KPI ROW */\n.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}\n.kpi-card{padding:14px 16px;display:flex;flex-direction:column;gap:6px}\n.kpi-label{font-size:10px;color:var(--muted);font-weight:600;line-height:1.4}\n.kpi-val{font-size:28px;font-weight:900;line-height:1}\n.kpi-sub{font-size:10px;color:var(--muted);line-height:1.5}\n.kpi-bar{height:4px;border-radius:4px;background:rgba(255,255,255,.07);overflow:hidden;margin-top:4px}\n.kpi-fill{height:100%;border-radius:4px;transition:width .4s}\n.fill-green{background:linear-gradient(90deg,var(--green2),var(--green))}\n.fill-yellow{background:linear-gradient(90deg,#c8910a,var(--yellow))}\n.fill-orange{background:linear-gradient(90deg,#c4610a,var(--orange))}\n.fill-red{background:linear-gradient(90deg,#c4143a,var(--red))}\n.fill-blue{background:linear-gradient(90deg,#1a8fcf,var(--blue))}\n.fill-purple{background:linear-gradient(90deg,var(--purple2),var(--purple))}\n.kpi-card.k-green{border-color:rgba(37,214,139,.28)}\n.kpi-card.k-yellow{border-color:rgba(255,210,94,.28)}\n.kpi-card.k-orange{border-color:rgba(255,159,67,.28)}\n.kpi-card.k-red{border-color:rgba(255,77,103,.3)}\n.kpi-card.k-blue{border-color:rgba(76,201,255,.28)}\n\n/* TABS */\n.tabs-bar{display:flex;gap:6px;padding:12px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}\n.tab{padding:7px 14px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--muted);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:.18s}\n.tab:hover{color:var(--ink);background:rgba(255,255,255,.05)}\n.tab.active{background:rgba(123,61,255,.2);border-color:rgba(123,61,255,.5);color:var(--ink)}\n.tab-content{display:none;padding:16px}\n.tab-content.active{display:block}\n\n/* MAP SECTION */\n.map-layout{display:grid;grid-template-columns:1fr 290px;gap:12px;min-height:500px}\n.map-wrap{position:relative;border:1px solid rgba(215,177,94,.2);border-radius:16px;overflow:hidden;background:linear-gradient(145deg,#06101e,#0c1a30)}\n.map-svg-wrap{position:absolute;inset:0}\n.map-svg-wrap svg{width:100%;height:100%}\n.map-status-badge{position:absolute;top:10px;right:10px;z-index:5;padding:6px 10px;border-radius:10px;font-size:10px;font-weight:700;background:rgba(5,9,20,.85);border:1px solid rgba(255,210,94,.25);color:#ffe7a3;backdrop-filter:blur(8px)}\n.map-legend{position:absolute;bottom:10px;right:10px;z-index:5;background:rgba(5,9,20,.85);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 12px;backdrop-filter:blur(8px)}\n.leg-item{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--muted);margin-bottom:5px}\n.leg-item:last-child{margin-bottom:0}\n.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}\n\n.map-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}\n.mfilter{padding:5px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--muted);font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;transition:.15s}\n.mfilter:hover{color:var(--ink);border-color:rgba(255,255,255,.2)}\n.mfilter.on{background:rgba(123,61,255,.2);border-color:rgba(123,61,255,.5);color:var(--ink)}\n\n/* ZONE INFO CARD */\n.zone-info-panel{display:flex;flex-direction:column;gap:8px;overflow-y:auto}\n.zone-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:13px}\n.zone-card h3{font-size:15px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:8px}\n.zone-dl{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px}\n.zone-dt{font-size:10px;color:var(--muted)}\n.zone-dd{font-size:11px;font-weight:700;color:var(--ink)}\n.zone-rec{margin-top:10px;padding:8px;border-radius:10px;background:rgba(123,61,255,.12);border:1px solid rgba(123,61,255,.2);font-size:11px;color:#c4a4ff;line-height:1.6}\n\n/* SVG ZONE styles - applied via JS */\n.z-green{fill:#25D68B;opacity:.75}\n.z-yellow{fill:#FFD25E;opacity:.70}\n.z-orange{fill:#FF9F43;opacity:.72}\n.z-red{fill:#FF4D67;opacity:.72}\n.z-blue{fill:#4CC9FF;opacity:.65}\n.zone-shape{cursor:pointer;transition:opacity .2s,transform .2s;transform-origin:center}\n.zone-shape:hover{opacity:.92;transform:scale(1.03)}\n.zone-label{font-size:11px;fill:#fff;font-weight:700;text-anchor:middle;pointer-events:none;font-family:'IBM Plex Sans Arabic',Tahoma,sans-serif}\n.zone-pct{font-size:10px;fill:rgba(255,255,255,.8);text-anchor:middle;pointer-events:none;font-family:'IBM Plex Sans Arabic',Tahoma,sans-serif}\n\n/* READINESS GRID */\n.readiness-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}\n.r-item{padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);transition:.18s}\n.r-item:hover{background:rgba(255,255,255,.055)}\n.r-item.r-ok{border-color:rgba(37,214,139,.28);background:rgba(37,214,139,.04)}\n.r-item.r-warn{border-color:rgba(255,210,94,.28);background:rgba(255,210,94,.04)}\n.r-item.r-fail{border-color:rgba(255,77,103,.28);background:rgba(255,77,103,.04)}\n.r-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}\n.r-icon{font-size:18px}\n.r-status-dot{width:8px;height:8px;border-radius:50%}\n.r-name{font-size:12px;font-weight:700;margin-bottom:4px}\n.r-meta{font-size:10px;color:var(--muted);line-height:1.6}\n.r-owner{display:inline-block;margin-top:6px;padding:3px 7px;border-radius:6px;font-size:9px;font-weight:700;background:rgba(255,255,255,.07);color:var(--muted)}\n\n/* RISK HEATMAP */\n.heatmap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}\n.heat-card{padding:13px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);position:relative;overflow:hidden}\n.heat-card::after{content:\"\";position:absolute;inset:0;opacity:.06;pointer-events:none}\n.heat-card.hg::after{background:var(--green)}\n.heat-card.hy::after{background:var(--yellow)}\n.heat-card.ho::after{background:var(--orange)}\n.heat-card.hr::after{background:var(--red)}\n.heat-card.hg{border-color:rgba(37,214,139,.3)}\n.heat-card.hy{border-color:rgba(255,210,94,.3)}\n.heat-card.ho{border-color:rgba(255,159,67,.3)}\n.heat-card.hr{border-color:rgba(255,77,103,.3);animation:pulse-border 2s infinite}\n.heat-name{font-size:12px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}\n.heat-score{font-size:26px;font-weight:900;line-height:1;margin:5px 0}\n.heat-bar-wrap{height:4px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden;margin:5px 0}\n.heat-bar-fill{height:100%;border-radius:4px}\n.heat-meta{font-size:10px;color:var(--muted);line-height:1.6}\n\n/* CRITERIA TABLE */\n.criteria-list{display:flex;flex-direction:column;gap:8px}\n.criteria-row{display:grid;grid-template-columns:180px 100px 80px 80px 120px 1fr auto;gap:8px;align-items:center;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.025);font-size:11px;transition:.15s}\n.criteria-row:hover{background:rgba(255,255,255,.05)}\n.criteria-row .cr-name{font-weight:700}\n.criteria-row .cr-zone{color:var(--muted)}\n.criteria-row .cr-owner{color:var(--blue)}\n.criteria-row .cr-update{color:var(--muted);font-size:10px}\n.criteria-row .cr-task{color:var(--muted);font-size:10px;line-height:1.4}\n.criteria-head{display:grid;grid-template-columns:180px 100px 80px 80px 120px 1fr auto;gap:8px;padding:7px 12px;font-size:10px;color:var(--muted);font-weight:700;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:6px}\n\n/* EOD */\n.eod-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}\n.eod-compare{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}\n.compare-card{padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);text-align:center}\n.compare-val{font-size:36px;font-weight:900;line-height:1;margin-bottom:4px}\n.compare-label{font-size:10px;color:var(--muted)}\n.eod-lists{display:grid;grid-template-columns:1fr 1fr;gap:10px}\n.eod-list h4{font-size:12px;color:#c4a4ff;margin-bottom:8px;font-weight:700}\n.eod-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:11px}\n.eod-item:last-child{border-bottom:0}\n.eod-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}\n.night-recs{display:flex;flex-direction:column;gap:7px}\n.night-rec{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.025);font-size:11px}\n.night-rec-num{width:24px;height:24px;border-radius:8px;background:rgba(123,61,255,.25);display:grid;place-items:center;font-size:10px;font-weight:900;flex-shrink:0;color:#c4a4ff}\n\n/* REPORTS */\n.reports-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}\n.report-card{padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025);display:flex;flex-direction:column;gap:8px}\n.report-card b{font-size:13px;font-weight:800}\n.report-card small{font-size:10px;color:var(--muted);line-height:1.6;flex:1}\n.report-btns{display:flex;gap:6px;flex-wrap:wrap}\n.btn-pdf{padding:6px 12px;border:0;border-radius:8px;background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;font-family:inherit;font-size:10px;font-weight:900;cursor:pointer;transition:.15s}\n.btn-pdf:hover{filter:brightness(1.1)}\n.btn-ppt{padding:6px 12px;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:rgba(255,255,255,.055);color:var(--ink);font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;transition:.15s}\n.btn-ppt:hover{background:rgba(255,255,255,.1)}\n\n/* TIMELINE */\n.timeline{display:flex;flex-direction:column;gap:8px}\n.t-event{display:grid;grid-template-columns:60px 1fr auto;gap:10px;align-items:center;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.025)}\n.t-time{font-size:11px;font-weight:800;color:#f6d98d}\n.t-body b{font-size:12px;display:block;margin-bottom:2px}\n.t-body small{font-size:10px;color:var(--muted)}\n\n/* BADGE */\n.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:9px;font-weight:900;white-space:nowrap}\n.bg{background:rgba(37,214,139,.14);color:#61edb0;border:1px solid rgba(37,214,139,.2)}\n.by{background:rgba(255,210,94,.14);color:#ffe07b;border:1px solid rgba(255,210,94,.2)}\n.bo{background:rgba(255,159,67,.14);color:#ffbd7a;border:1px solid rgba(255,159,67,.2)}\n.br{background:rgba(255,77,103,.14);color:#ff8ca0;border:1px solid rgba(255,77,103,.2)}\n.bb{background:rgba(76,201,255,.14);color:#90e2ff;border:1px solid rgba(76,201,255,.2)}\n.bp{background:rgba(123,61,255,.18);color:#c4a4ff;border:1px solid rgba(123,61,255,.25)}\n\n/* LIVE FEED */\n.feed-panel{display:flex;flex-direction:column;gap:7px}\n.feed-item{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border-radius:11px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.025);font-size:11px}\n.feed-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:2px}\n.feed-body{flex:1}\n.feed-body b{display:block;margin-bottom:3px}\n.feed-body span{color:var(--muted);font-size:10px}\n.feed-time{font-size:10px;color:var(--muted);white-space:nowrap}\n\n/* TOP/WORST LISTS */\n.side-lists{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}\n.side-list{padding:13px}\n.side-list h3{font-size:13px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:6px}\n.side-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:11px}\n.side-row:last-child{border-bottom:0}\n\n/* ENV CONFIG */\n.env-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}\n.env-code{display:block;direction:ltr;text-align:left;border:1px solid rgba(255,255,255,.08);border-radius:11px;padding:9px 11px;background:rgba(0,0,0,.25);color:#b0c4f7;font-family:'Courier New',monospace;font-size:10px}\n\n/* TOAST */\n.toast{position:fixed;bottom:16px;right:16px;z-index:999;padding:10px 16px;border-radius:14px;background:rgba(5,9,20,.92);border:1px solid rgba(37,214,139,.3);color:#fff;font-size:12px;box-shadow:0 16px 50px rgba(0,0,0,.5);display:none;max-width:320px}\n.toast.show{display:block;animation:toastIn .3s ease}\n@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}\n\n/* RESPONSIVE */\n@media(max-width:1200px){\n  .hero-grid,.eod-grid,.map-layout{grid-template-columns:1fr}\n  .kpi-row{grid-template-columns:repeat(3,1fr)}\n  .side-lists{grid-template-columns:1fr}\n}\n@media(max-width:768px){\n  .app{padding:10px;gap:10px}\n  .kpi-row{grid-template-columns:1fr 1fr}\n  .topbar{grid-template-columns:1fr auto}\n  .page-title{display:none}\n  .criteria-row{grid-template-columns:1fr 1fr;flex-wrap:wrap}\n  .env-grid{grid-template-columns:1fr 1fr}\n  .reports-grid{grid-template-columns:1fr 1fr}\n  .readiness-grid{grid-template-columns:repeat(2,1fr)}\n  .heatmap-grid{grid-template-columns:repeat(2,1fr)}\n}\n@media(max-width:480px){\n  .kpi-row{grid-template-columns:1fr}\n  .hero-main h1{font-size:20px}\n  .big-score{font-size:44px}\n}\n\n/* SECTION HEADER */\n.sec-head{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between;gap:10px}\n.sec-head h2{font-size:16px;font-weight:800}\n.sec-head p{font-size:11px;color:var(--muted);margin-top:3px}\n.sec-head-right{display:flex;align-items:center;gap:8px;flex-shrink:0}\n\n/* PULSE */\n.pulse-dot{display:inline-block;width:8px;height:8px;border-radius:50%;animation:pulse-anim 1.6s infinite}\n@keyframes pulse-anim{0%,100%{box-shadow:0 0 0 0 currentColor}70%{box-shadow:0 0 0 8px transparent}}\n.pulse-red{background:var(--red);color:rgba(255,77,103,.5)}\n.pulse-yellow{background:var(--yellow);color:rgba(255,210,94,.5)}\n.pulse-green{background:var(--green);color:rgba(37,214,139,.5)}\n</style>\n</head>\n<body>\n<div class=\"app\">\n\n<!-- TOPBAR -->\n<div class=\"panel topbar\">\n  <div class=\"brand\">\n    <div class=\"brand-logo\">P</div>\n    <div class=\"brand-text\">\n      <h1>PROACTIVE</h1>\n      <small>المنصة الاستباقية — معرض الكتاب ٢٠٢٦</small>\n    </div>\n  </div>\n  <div class=\"page-title\">\n    <h2>مركز قيادة تجربة الزائر الاستباقي</h2>\n    <p>الامتثال لمعايير تجربة الزائر • مركز قرار تشغيلي متكامل</p>\n  </div>\n  <div class=\"pills\">\n    <div class=\"pill\">آخر تحديث <b id=\"liveTime\">10:35 ص</b></div>\n    <div class=\"pill\">الزوار الآن <b>14,200</b></div>\n    <div class=\"pill\">حالة اليوم <b id=\"dayStatusPill\">يحتاج متابعة</b></div>\n  </div>\n</div>\n\n<!-- HERO - DAY STATUS -->\n<div class=\"panel hero-grid\">\n  <div class=\"hero-main\">\n    <div>\n      <span class=\"eyebrow\"><span class=\"eyebrow-dot\"></span>مركز قيادة استباقي • الامتثال لمعايير تجربة الزائر</span>\n      <h1>مركز قيادة تجربة الزائر الاستباقي</h1>\n      <p>يقيس الجاهزية المسائية، يتابع الامتثال خلال اليوم، يرصد المخاطر قبل تحولها إلى أزمة، ويصدر توصيات فورية قابلة للتنفيذ — ثم يُصدر تقييم نهاية اليوم وخطة ما بعد الإغلاق استعدادًا لليوم التالي.</p>\n    </div>\n    <div class=\"day-meta\">\n      <span class=\"day-seal seal-warning\" id=\"mainSeal\">حالة اليوم: يحتاج متابعة</span>\n      <span class=\"day-seal seal-danger\">⚠ دورات المياه الشرقية — تدخل فوري</span>\n      <span class=\"day-seal seal-ok\">✓ VIP ومسارات ذوي الإعاقة — مستقر</span>\n    </div>\n  </div>\n  <div class=\"hero-status\">\n    <div class=\"big-score\" id=\"mainScore\">84%</div>\n    <div class=\"score-label\">مؤشر تجربة الزائر العام<br>الأولوية: معالجة المداخل<br>ودورات المياه قبل الذروة</div>\n    <div class=\"score-change\">↑ +4% عن أمس</div>\n  </div>\n</div>\n\n<!-- KPI ROW -->\n<div class=\"kpi-row\">\n  <div class=\"panel card kpi-card k-green\">\n    <div class=\"kpi-label\">مؤشر تجربة الزائر العام</div>\n    <div class=\"kpi-val\" style=\"color:var(--green)\">84%</div>\n    <div class=\"kpi-sub\">مقبول تشغيليًا مع نقاط متابعة عالية الحساسية</div>\n    <div class=\"kpi-bar\"><div class=\"kpi-fill fill-green\" style=\"width:84%\"></div></div>\n  </div>\n  <div class=\"panel card kpi-card k-green\">\n    <div class=\"kpi-label\">مؤشر الجاهزية المسائية</div>\n    <div class=\"kpi-val\" style=\"color:var(--green)\">91%</div>\n    <div class=\"kpi-sub\">بندان يحتاجان متابعة قبل الافتتاح</div>\n    <div class=\"kpi-bar\"><div class=\"kpi-fill fill-green\" style=\"width:91%\"></div></div>\n  </div>\n  <div class=\"panel card kpi-card k-yellow\">\n    <div class=\"kpi-label\">مؤشر الامتثال اليومي</div>\n    <div class=\"kpi-val\" style=\"color:var(--yellow)\">78%</div>\n    <div class=\"kpi-sub\">انخفاض مرتبط بالمداخل ومناطق الانتظار</div>\n    <div class=\"kpi-bar\"><div class=\"kpi-fill fill-yellow\" style=\"width:78%\"></div></div>\n  </div>\n  <div class=\"panel card kpi-card k-orange\">\n    <div class=\"kpi-label\">مؤشر المخاطر المتوقعة</div>\n    <div class=\"kpi-val\" style=\"color:var(--orange)\">متوسط</div>\n    <div class=\"kpi-sub\">3 مناطق قابلة للتصعيد خلال 90 دقيقة</div>\n    <div class=\"kpi-bar\"><div class=\"kpi-fill fill-orange\" style=\"width:64%\"></div></div>\n  </div>\n  <div class=\"panel card kpi-card k-blue\">\n    <div class=\"kpi-label\">البلاغات المفتوحة</div>\n    <div class=\"kpi-val\" style=\"color:var(--blue)\">18</div>\n    <div class=\"kpi-sub\">7 بلاغات حرجة • 11 قيد المتابعة</div>\n    <div class=\"kpi-bar\"><div class=\"kpi-fill fill-red\" style=\"width:38%\"></div></div>\n  </div>\n</div>\n\n<!-- MAIN TABBED PANEL -->\n<div class=\"panel\">\n  <div class=\"tabs-bar\">\n    <button class=\"tab active\" onclick=\"switchTab('map')\">🗺 خريطة تجربة الزائر</button>\n    <button class=\"tab\" onclick=\"switchTab('morning')\">🌅 الجاهزية المسائية</button>\n    <button class=\"tab\" onclick=\"switchTab('risk')\">⚠ محاكاة المخاطر</button>\n    <button class=\"tab\" onclick=\"switchTab('criteria')\">📋 ربط المعايير بالمهام</button>\n    <button class=\"tab\" onclick=\"switchTab('eod')\">🌙 تقييم نهاية اليوم</button>\n    <button class=\"tab\" onclick=\"switchTab('reports')\">📤 التقارير</button>\n  </div>\n\n  <!-- TAB: MAP -->\n  <div class=\"tab-content active\" id=\"tab-map\">\n    <div class=\"sec-head\" style=\"padding:0 0 12px\">\n      <div>\n        <h2>خريطة تجربة الزائر التفاعلية</h2>\n        <p>مرتبطة بالمؤشرات والبلاغات والملاحظات والتوصيات — اضغط على أي منطقة لعرض تفاصيلها</p>\n      </div>\n      <div class=\"sec-head-right\">\n        <span class=\"badge by\"><span class=\"pulse-dot pulse-yellow\" style=\"display:inline-block;margin-left:4px\"></span>وضع الخريطة التجريبية مفعل</span>\n      </div>\n    </div>\n    <div class=\"map-filters\">\n      <button class=\"mfilter on\" data-f=\"all\">الكل</button>\n      <button class=\"mfilter\" data-f=\"green\">مستقر</button>\n      <button class=\"mfilter\" data-f=\"yellow\">يحتاج متابعة</button>\n      <button class=\"mfilter\" data-f=\"orange\">خطر متوسط</button>\n      <button class=\"mfilter\" data-f=\"red\">خطر حرج</button>\n      <button class=\"mfilter\" data-f=\"crowd\">Layer الحشود</button>\n      <button class=\"mfilter\" data-f=\"reports\">Layer البلاغات</button>\n      <button class=\"mfilter\" data-f=\"readiness\">Layer الجاهزية</button>\n      <button class=\"mfilter\" data-f=\"routes\">Layer مسارات الزوار</button>\n    </div>\n    <div class=\"map-layout\">\n      <div class=\"map-wrap\" style=\"min-height:480px\">\n        <div class=\"map-svg-wrap\">\n          <svg viewBox=\"0 0 900 540\" xmlns=\"http://www.w3.org/2000/svg\">\n            <defs>\n              <radialGradient id=\"bg-grad\" cx=\"50%\" cy=\"50%\"><stop offset=\"0%\" stop-color=\"#0e1e3a\"/><stop offset=\"100%\" stop-color=\"#06101e\"/></radialGradient>\n              <linearGradient id=\"route-grad\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\"><stop offset=\"0%\" stop-color=\"#4CC9FF\" stop-opacity=\".6\"/><stop offset=\"100%\" stop-color=\"#7B3DFF\" stop-opacity=\".6\"/></linearGradient>\n              <filter id=\"glow\"><feGaussianBlur stdDeviation=\"3\" result=\"blur\"/><feComposite in=\"SourceGraphic\" in2=\"blur\" operator=\"over\"/></filter>\n              <filter id=\"glow-strong\"><feGaussianBlur stdDeviation=\"6\" result=\"blur\"/><feComposite in=\"SourceGraphic\" in2=\"blur\" operator=\"over\"/></filter>\n            </defs>\n            <!-- Background -->\n            <rect width=\"900\" height=\"540\" fill=\"url(#bg-grad)\"/>\n            <!-- Grid lines -->\n            <g stroke=\"rgba(255,255,255,.04)\" stroke-width=\".5\">\n              <line x1=\"0\" y1=\"108\" x2=\"900\" y2=\"108\"/>\n              <line x1=\"0\" y1=\"216\" x2=\"900\" y2=\"216\"/>\n              <line x1=\"0\" y1=\"324\" x2=\"900\" y2=\"324\"/>\n              <line x1=\"0\" y1=\"432\" x2=\"900\" y2=\"432\"/>\n              <line x1=\"180\" y1=\"0\" x2=\"180\" y2=\"540\"/>\n              <line x1=\"360\" y1=\"0\" x2=\"360\" y2=\"540\"/>\n              <line x1=\"540\" y1=\"0\" x2=\"540\" y2=\"540\"/>\n              <line x1=\"720\" y1=\"0\" x2=\"720\" y2=\"540\"/>\n            </g>\n            <!-- Main visitor route -->\n            <path d=\"M60 490 C150 420 200 360 280 300 S380 240 460 220 S580 200 680 170 S790 130 850 90\" stroke=\"url(#route-grad)\" stroke-width=\"18\" fill=\"none\" stroke-linecap=\"round\" opacity=\".5\" class=\"route-path\"/>\n            <!-- Route dashes -->\n            <path d=\"M60 490 C150 420 200 360 280 300 S380 240 460 220 S580 200 680 170 S790 130 850 90\" stroke=\"rgba(76,201,255,.8)\" stroke-width=\"2\" fill=\"none\" stroke-dasharray=\"8 12\" stroke-linecap=\"round\"/>\n\n            <!-- ZONE: مواقف السيارات (parking north) - YELLOW -->\n            <g class=\"zone-shape\" data-zone=\"مواقف السيارات\" onclick=\"showZone('مواقف السيارات')\">\n              <rect x=\"30\" y=\"30\" width=\"130\" height=\"90\" rx=\"16\" fill=\"#FFD25E\" opacity=\".65\"/>\n              <rect x=\"30\" y=\"30\" width=\"130\" height=\"90\" rx=\"16\" fill=\"none\" stroke=\"#FFD25E\" stroke-width=\"1.5\" opacity=\".9\"/>\n              <text x=\"95\" y=\"70\" class=\"zone-label\">مواقف السيارات</text>\n              <text x=\"95\" y=\"87\" class=\"zone-pct\">81% امتثال</text>\n              <circle cx=\"155\" cy=\"35\" r=\"10\" fill=\"#FFD25E\"/>\n              <text x=\"155\" y=\"39\" fill=\"#07111f\" font-size=\"10\" font-weight=\"900\" text-anchor=\"middle\">2</text>\n            </g>\n\n            <!-- ZONE: مدخل VIP (top right) - GREEN -->\n            <g class=\"zone-shape\" data-zone=\"كبار الشخصيات\" onclick=\"showZone('كبار الشخصيات')\">\n              <rect x=\"750\" y=\"25\" width=\"130\" height=\"85\" rx=\"16\" fill=\"#25D68B\" opacity=\".65\"/>\n              <rect x=\"750\" y=\"25\" width=\"130\" height=\"85\" rx=\"16\" fill=\"none\" stroke=\"#25D68B\" stroke-width=\"1.5\" opacity=\".9\"/>\n              <text x=\"815\" y=\"62\" class=\"zone-label\">كبار الشخصيات</text>\n              <text x=\"815\" y=\"79\" class=\"zone-pct\">93% امتثال</text>\n              <circle cx=\"870\" cy=\"30\" r=\"10\" fill=\"#25D68B\"/>\n              <text x=\"870\" y=\"34\" fill=\"#07111f\" font-size=\"10\" font-weight=\"900\" text-anchor=\"middle\">0</text>\n            </g>\n\n            <!-- ZONE: مدخل رئيسي (left-middle) - ORANGE -->\n            <g class=\"zone-shape\" data-zone=\"المدخل الرئيسي\" onclick=\"showZone('المدخل الرئيسي')\">\n              <ellipse cx=\"120\" cy=\"300\" rx=\"95\" ry=\"75\" fill=\"#FF9F43\" opacity=\".70\"/>\n              <ellipse cx=\"120\" cy=\"300\" rx=\"95\" ry=\"75\" fill=\"none\" stroke=\"#FF9F43\" stroke-width=\"2\" opacity=\".9\"/>\n              <text x=\"120\" y=\"293\" class=\"zone-label\" filter=\"url(#glow)\">المدخل الرئيسي</text>\n              <text x=\"120\" y=\"313\" class=\"zone-pct\">72% امتثال</text>\n              <circle cx=\"205\" cy=\"232\" r=\"12\" fill=\"#FF9F43\"/>\n              <text x=\"205\" y=\"236\" fill=\"#07111f\" font-size=\"10\" font-weight=\"900\" text-anchor=\"middle\">3</text>\n            </g>\n\n            <!-- ZONE: نقطة استعلام (center-top) - GREEN -->\n            <g class=\"zone-shape\" data-zone=\"نقطة الاستعلام\" onclick=\"showZone('نقطة الاستعلام')\">\n              <ellipse cx=\"450\" cy=\"130\" rx=\"80\" ry=\"60\" fill=\"#25D68B\" opacity=\".65\"/>\n              <ellipse cx=\"450\" cy=\"130\" rx=\"80\" ry=\"60\" fill=\"none\" stroke=\"#25D68B\" stroke-width=\"1.5\"/>\n              <text x=\"450\" y=\"124\" class=\"zone-label\">نقطة الاستعلام</text>\n              <text x=\"450\" y=\"141\" class=\"zone-pct\">96% امتثال</text>\n              <circle cx=\"522\" cy=\"76\" r=\"10\" fill=\"#25D68B\"/>\n              <text x=\"522\" y=\"80\" fill=\"#07111f\" font-size=\"10\" font-weight=\"900\" text-anchor=\"middle\">0</text>\n            </g>\n\n            <!-- ZONE: دورات مياه (center) - RED -->\n            <g class=\"zone-shape\" data-zone=\"دورات المياه الشرقية\" onclick=\"showZone('دورات المياه الشرقية')\">\n              <ellipse cx=\"450\" cy=\"310\" rx=\"100\" ry=\"80\" fill=\"#FF4D67\" opacity=\".72\"/>\n              <ellipse cx=\"450\" cy=\"310\" rx=\"100\" ry=\"80\" fill=\"none\" stroke=\"#FF4D67\" stroke-width=\"2.5\" opacity=\".9\" filter=\"url(#glow)\"/>\n              <!-- Pulsing ring -->\n              <ellipse cx=\"450\" cy=\"310\" rx=\"108\" ry=\"88\" fill=\"none\" stroke=\"#FF4D67\" stroke-width=\"1\" opacity=\".4\">\n                <animate attributeName=\"rx\" values=\"100;115;100\" dur=\"2s\" repeatCount=\"indefinite\"/>\n                <animate attributeName=\"ry\" values=\"80;95;80\" dur=\"2s\" repeatCount=\"indefinite\"/>\n                <animate attributeName=\"opacity\" values=\".4;0;.4\" dur=\"2s\" repeatCount=\"indefinite\"/>\n              </ellipse>\n              <text x=\"450\" y=\ :'r-fail'};\n  const dotC = {ok:'var(--green)',warn:'var(--yellow)',fail:'var(--red)'};\n  const lbl  = {ok:'جاهز',warn:'يحتاج متابعة',fail:'غير جاهز'};\n  const bCls = {ok:'bg',warn:'by',fail:'br'};\n  const el = document.getElementById('readinessGrid');\n  el.innerHTML = READINESS.map(r=>`\n    <div class=\"r-item ${map[r.status]}\">\n      <div class=\"r-header\">\n        <span class=\"r-icon\">${r.icon}</span>\n        <div class=\"r-status-dot\" style=\"background:${dotC[r.status]}\"></div>\n      </div>\n      <div class=\"r-name\">${r.name}</div>\n      <div style=\"margin-bottom:5px\">${badge(bCls[r.status], lbl[r.status])}</div>\n      <div class=\"r-meta\">${r.note}<br>📍 ${r.zone} • 📂 ${r.proof}</div>\n      <span class=\"r-owner\">${r.owner}</span>\n    </div>`).join('');\n}\n\nfunction renderHeat(){\n  const labC = {hg:'var(--green)',hy:'var(--yellow)',ho:'var(--orange)',hr:'var(--red)'};\n  const el = document.getElementById('heatGrid');\n  el.innerHTML = HEAT.map(h=>`\n    <div class=\"heat-card ${h.cls}\">\n      <div class=\"heat-name\" style=\"color:${labC[h.cls]}\">${h.name}<span style=\"font-size:10px;color:var(--muted);font-weight:400;margin-right:auto\">${h.trend}</span></div>\n      <div class=\"heat-score\" style=\"color:${labC[h.cls]}\">${h.score}%</div>\n      <div class=\"heat-bar-wrap\"><div class=\"heat-bar-fill\" style=\"width:${h.score}%;background:${labC[h.cls]}\"></div></div>\n      <div class=\"heat-meta\">وقت التدخل: <b>${h.time}</b><br>${h.pred}<br>أثر المخاطرة: <b>${h.impact}</b></div>\n    </div>`).join('');\n  \n  const ta = document.getElementById('alertTimeline');\n  const clsMap = {orange:'bo',green:'bg',red:'br',yellow:'by'};\n  const dotMap  = {orange:'var(--orange)',green:'var(--green)',red:'var(--red)',yellow:'var(--yellow)'};\n  ta.innerHTML = ALERTS.map(a=>`\n    <div class=\"t-event\">\n      <div class=\"t-time\">${a.time}</div>\n      <div class=\"t-body\"><b>${a.title}</b><small>${a.desc}</small></div>\n      ${badge(clsMap[a.level], a.level==='green'?'مستقر':a.level==='orange'?'تنبيه':a.level==='red'?'تدخل فوري':'متابعة')}\n    </div>`).join('');\n}\n\nfunction renderCriteria(){\n  const sC = {ممتاز:'bg',جيد:'bg','قيد المعالجة':'bo',متابعة:'by',تصعيد:'br'};\n  const el = document.getElementById('criteriaList');\n  el.innerHTML = CRITERIA.map(c=>`\n    <div class=\"criteria-row\">\n      <div class=\"cr-name\">${c.name}</div>\n      <div class=\"cr-zone\" style=\"color:var(--blue)\">${c.zone}</div>\n      <div style=\"color:${c.score<70?'var(--red)':c.score<85?'var(--yellow)':'var(--green)'};font-weight:900\">${c.score}%</div>\n      <div>${badge(sC[c.status]||'bb',c.status)}</div>\n      <div class=\"cr-owner\" style=\"color:var(--blue)\">${c.owner}</div>\n      <div class=\"cr-task\">${c.task} <span style=\"opacity:.6\">| دليل: ${c.proof}</span></div>\n      <div style=\"font-size:10px;color:var(--muted);white-space:nowrap\">${c.deadline}</div>\n    </div>`).join('');\n}\n\nfunction renderEOD(){\n  const eb = document.getElementById('eodBest');\n  const ew = document.getElementById('eodWorst');\n  eb.innerHTML = EOD_BEST.map(t=>`<div class=\"eod-item\"><div class=\"eod-dot\" style=\"background:var(--green)\"></div><span>${t}</span></div>`).join('');\n  ew.innerHTML = EOD_WORST.map(t=>`<div class=\"eod-item\"><div class=\"eod-dot\" style=\"background:var(--red)\"></div><span>${t}</span></div>`).join('');\n  \n  const nr = document.getElementById('nightRecs');\n  nr.innerHTML = NIGHT_RECS.map(r=>`\n    <div class=\"night-rec\">\n      <div style=\"display:flex;align-items:flex-start;gap:9px\">\n        <div class=\"night-rec-num\">${r.num}</div>\n        <div>\n          <div style=\"font-size:12px;font-weight:700;margin-bottom:3px\">${r.title}</div>\n          <div style=\"font-size:10px;color:var(--muted);line-height:1.6\">${r.note}</div>\n          <div style=\"font-size:10px;color:var(--muted);margin-top:3px\">⏰ ${r.deadline} • ${r.owner}</div>\n        </div>\n      </div>\n      ${badge(r.cls, r.tag)}\n    </div>`).join('');\n}\n\nfunction renderReports(){\n  const el = document.getElementById('reportsGrid');\n  el.innerHTML = REPORTS_DATA.map(r=>`\n    <div class=\"report-card\">\n      <b>${r.title}</b>\n      <small>${r.desc}</small>\n      <div class=\"report-btns\">\n        <button class=\"btn-pdf\" onclick=\"toast('جارٍ تجهيز PDF: ${r.title}')\">📄 PDF</button>\n        ${r.hasPPT ? `<button class=\"btn-ppt\" onclick=\"toast('جارٍ تجهيز PPT: ${r.title}')\">📊 PPT</button>` : ''}\n      </div>\n    </div>`).join('');\n}\n\nfunction renderLists(){\n  // Live feed\n  const lf = document.getElementById('liveFeed');\n  lf.innerHTML = LIVE_FEED.map(f=>`\n    <div class=\"feed-item\">\n      <div class=\"feed-dot\" style=\"background:${f.dot}\"></div>\n      <div class=\"feed-body\"><b>${f.title}</b><span>${f.note}</span></div>\n      <div class=\"feed-time\">${f.time}</div>\n    </div>`).join('');\n  \n  // Risk list\n  const tr = document.getElementById('topRisk');\n  const cls = {orange:'bo',yellow:'by',red:'br',green:'bg'};\n  const lbl = {orange:'متوسط',yellow:'متابعة',red:'حرج',green:'مستقر'};\n  const sorted = Object.entries(ZONES).sort((a,b)=>a[1].score-b[1].score).slice(0,4);\n  tr.innerHTML = sorted.map(([n,z])=>`\n    <div class=\"side-row\"><span style=\"font-size:11px\">${n}</span>${badge(cls[z.level],lbl[z.level])}</div>`).join('');\n  \n  // Best performers\n  const tp = document.getElementById('topPerf');\n  const best = Object.entries(ZONES).sort((a,b)=>b[1].score-a[1].score).slice(0,4);\n  tp.innerHTML = best.map(([n,z])=>`\n    <div class=\"side-row\"><span style=\"font-size:11px\">${n}</span><span style=\"font-size:11px;font-weight:700;color:var(--green)\">${z.score}%</span></div>`).join('');\n  \n  // Actions\n  const ta = document.getElementById('topActions');\n  const actions = Object.entries(ZONES).filter(([,z])=>z.level!=='green').slice(0,4);\n  ta.innerHTML = actions.map(([n,z])=>`\n    <div class=\"side-row\"><span style=\"font-size:11px\">${z.action}</span><span style=\"font-size:9px;color:var(--muted)\">${n}</span></div>`).join('');\n}\n\n/* ======================== TABS ======================== */\nfunction switchTab(id){\n  document.querySelectorAll('.tab').forEach((t,i)=>{\n    const ids = ['map','morning','risk','criteria','eod','reports'];\n    t.classList.toggle('active', ids[i]===id);\n  });\n  document.querySelectorAll('.tab-content').forEach(c=>{\n    c.classList.toggle('active', c.id==='tab-'+id);\n  });\n}\n\n/* ======================== MAP FILTERS ======================== */\ndocument.querySelectorAll('.mfilter').forEach(btn=>{\n  btn.addEventListener('click',()=>{\n    document.querySelectorAll('.mfilter').forEach(b=>b.classList.remove('on'));\n    btn.classList.add('on');\n    const f = btn.dataset.f;\n    // Crowd layer\n    document.querySelectorAll('.crowd-layer').forEach(el=>{\n      el.style.display = (f==='crowd') ? 'block' : 'none';\n    });\n    // Route layer\n    document.querySelectorAll('.route-path').forEach(el=>{\n      el.style.opacity = (f==='routes') ? '.8' : '.5';\n    });\n  });\n});\n\n/* ======================== TOAST ======================== */\nfunction toast(msg){\n  const t = document.getElementById('toast');\n  t.textContent = '✓ ' + msg;\n  t.classList.add('show');\n  setTimeout(()=>t.classList.remove('show'), 3000);\n}\n\n/* ======================== LIVE CLOCK ======================== */\nfunction updateTime(){\n  const now = new Date();\n  const h = now.getHours();\n  const m = String(now.getMinutes()).padStart(2,'0');\n  const ampm = h>=12 ? 'م' : 'ص';\n  const h12 = h%12||12;\n  const el = document.getElementById('liveTime');\n  if(el) el.textContent = `${h12}:${m} ${ampm}`;\n}\nsetInterval(updateTime, 1000);\nupdateTime();\n\n/* ======================== INIT ======================== */\nshowZone('المدخل الرئيسي');\nrenderReadiness();\nrenderHeat();\nrenderCriteria();\nrenderEOD();\nrenderReports();\nrenderLists();\n<\/script>\n</body>\n</html>"},{"num":"22","title":"فريق العمل الميداني","html":"<!doctype html>\n<html lang=\"ar\" dir=\"rtl\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><title>فريق العمل الميداني</title><link href=\"https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap\" rel=\"stylesheet\"><style>\n:root{--bg:#061123;--card:rgba(10,22,48,.78);--card2:rgba(17,34,72,.72);--line:rgba(134,153,255,.18);--line2:rgba(255,255,255,.09);--ink:#f7f3ff;--muted:#aab6d3;--purple:#7B3DFF;--cyan:#24c8db;--green:#25D68B;--gold:#D7B15E;--red:#FF4D67;--blue:#3b82f6}\n*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% -10%,rgba(123,61,255,.23),transparent 34%),radial-gradient(circle at 95% 12%,rgba(36,200,219,.15),transparent 32%),linear-gradient(180deg,#050a18,#07152d);color:var(--ink);font-family:'IBM Plex Sans Arabic',Tahoma,Arial,sans-serif;overflow:hidden}body:before{content:\"\";position:fixed;inset:0;background:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:34px 34px;pointer-events:none;opacity:.55}.page{height:100vh;padding:18px;display:grid;grid-template-rows:auto 1fr;gap:14px}.top{display:flex;align-items:center;justify-content:space-between;gap:14px}.title h1{margin:0;font-size:30px;font-weight:900;letter-spacing:-.5px}.title p{margin:6px 0 0;color:var(--muted);font-size:13px}.chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.chip{border:1px solid var(--line2);background:rgba(255,255,255,.045);border-radius:999px;padding:8px 12px;color:#dce6ff;font-size:12px}.chip b{color:#fff}.grid{display:grid;grid-template-columns:310px minmax(520px,1fr) 300px;gap:14px;min-height:0}.card{background:linear-gradient(180deg,rgba(13,27,58,.84),rgba(7,15,34,.86));border:1px solid var(--line);border-radius:24px;box-shadow:0 24px 80px rgba(0,0,0,.35);backdrop-filter:blur(16px);position:relative;overflow:hidden}.card:before{content:\"\";position:absolute;inset:0;background:linear-gradient(135deg,rgba(123,61,255,.09),transparent 44%,rgba(36,200,219,.05));pointer-events:none}.card>*{position:relative;z-index:1}.panel{padding:16px;display:flex;flex-direction:column;gap:12px;min-height:0}.sectionHead{display:flex;justify-content:space-between;align-items:center;gap:8px}.sectionHead h2{margin:0;font-size:15px}.sectionHead small{color:var(--muted);font-size:11px}.selected{border:1px solid rgba(123,61,255,.42);background:linear-gradient(145deg,rgba(123,61,255,.20),rgba(36,200,219,.08));border-radius:20px;padding:14px}.avatar{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--purple),#3146c7);box-shadow:0 12px 28px rgba(123,61,255,.25)}.personTop{display:flex;align-items:center;gap:12px}.personTop h3{margin:0;font-size:17px}.personTop p{margin:3px 0 0;color:var(--muted);font-size:12px}.infoGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.infoBox{background:rgba(255,255,255,.045);border:1px solid var(--line2);border-radius:14px;padding:9px}.infoBox small{display:block;color:var(--muted);font-size:10px}.infoBox b{display:block;margin-top:3px;font-size:12px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.btn{border:1px solid var(--line2);border-radius:13px;padding:10px 8px;text-align:center;text-decoration:none;color:#fff;font-family:inherit;font-weight:800;font-size:12px;background:rgba(255,255,255,.06);cursor:pointer}.btn.green{background:rgba(37,214,139,.16);border-color:rgba(37,214,139,.35)}.btn.cyan{background:rgba(36,200,219,.15);border-color:rgba(36,200,219,.35)}.btn.gold{background:rgba(215,177,94,.15);border-color:rgba(215,177,94,.35)}.btn.red{grid-column:1/3;background:rgba(255,77,103,.13);border-color:rgba(255,77,103,.35);color:#ffb1bd}.list{overflow:auto;display:grid;gap:8px;padding-inline-end:2px}.row{display:grid;grid-template-columns:52px 1fr;gap:9px;align-items:center;border:1px solid var(--line2);background:rgba(255,255,255,.035);border-radius:15px;padding:9px;cursor:pointer}.row:hover,.row.active{border-color:rgba(123,61,255,.55);background:rgba(123,61,255,.12)}.row span{direction:ltr;background:rgba(123,61,255,.20);border:1px solid rgba(123,61,255,.36);border-radius:11px;padding:6px;text-align:center;font-weight:900;font-size:11px}.row b{font-size:12px}.row small{display:block;color:var(--muted);font-size:10px;margin-top:2px}.mapCard{padding:14px;display:flex;flex-direction:column;gap:10px}.mapToolbar{display:flex;align-items:center;justify-content:space-between;gap:10px}.tabs{display:flex;gap:8px}.tab{border:1px solid var(--line2);background:rgba(255,255,255,.045);border-radius:13px;padding:8px 10px;font-size:11px;color:#dce6ff}.tab.active{background:rgba(123,61,255,.22);border-color:rgba(123,61,255,.45)}.mapWrap{flex:1;min-height:0;border:1px solid rgba(255,255,255,.11);border-radius:22px;background:rgba(255,255,255,.04);overflow:hidden;position:relative;display:grid;place-items:center}.mapInner{position:relative;width:min(100%,870px);aspect-ratio:1/1;border-radius:18px;overflow:hidden;box-shadow:0 18px 60px rgba(0,0,0,.28);background:#e8d4cd}.mapInner img{width:100%;height:100%;object-fit:cover;display:block}.spot{position:absolute;left:calc(var(--x)*1%);top:calc(var(--y)*1%);transform:translate(-50%,-50%);border:1px solid rgba(255,255,255,.55);background:linear-gradient(135deg,#1f2937,#0b1224);color:#fff;border-radius:12px;padding:7px 9px;font-weight:900;font-size:11px;box-shadow:0 8px 20px rgba(0,0,0,.34);cursor:pointer;z-index:4}.spot:hover,.spot.on{background:linear-gradient(135deg,var(--purple),#2534a9);box-shadow:0 0 0 5px rgba(123,61,255,.20),0 12px 26px rgba(0,0,0,.36)}.legend{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:11px}.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-left:5px;background:var(--green)}.rightGrid{display:grid;gap:12px}.metric{padding:14px;border:1px solid var(--line2);border-radius:18px;background:rgba(255,255,255,.035)}.metric small{display:block;color:var(--muted);font-size:11px}.metric b{display:block;margin-top:5px;font-size:24px}.statusGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.status{border:1px solid var(--line2);border-radius:15px;padding:10px;background:rgba(255,255,255,.035)}.status small{color:var(--muted);font-size:10px}.status b{display:block;margin-top:4px}.log{min-height:70px;border:1px dashed rgba(255,255,255,.15);border-radius:16px;padding:12px;color:var(--muted);font-size:12px;line-height:1.7}.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:999;padding:20px}.modal.show{display:flex}.pop{width:min(520px,94vw);background:linear-gradient(180deg,#13254b,#081326);border:1px solid rgba(123,61,255,.45);border-radius:24px;padding:18px;box-shadow:0 30px 90px rgba(0,0,0,.55)}.popTop{display:flex;justify-content:space-between;gap:12px}.code{display:inline-block;background:rgba(123,61,255,.24);border:1px solid rgba(123,61,255,.45);border-radius:13px;padding:7px 10px;font-weight:900;direction:ltr}.close{border:0;background:rgba(255,255,255,.08);color:#fff;border-radius:13px;width:38px;height:38px;font-size:22px;cursor:pointer}.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(5,12,27,.95);border:1px solid rgba(37,214,139,.35);border-radius:14px;padding:10px 14px;color:#fff;display:none;z-index:1000;font-size:12px}.toast.show{display:block}@media(max-width:1200px){body{overflow:auto}.page{height:auto}.grid{grid-template-columns:1fr}.mapInner{width:100%}}\n</style></head><body><div class=\"page\"><header class=\"top\"><div class=\"title\"><h1>فريق العمل الميداني</h1><p>لوحة تشغيلية احترافية لإدارة مسؤولي المناطق مع خريطة تفاعلية وبيانات تواصل مباشرة.</p></div><div class=\"c const DB_KEY='PROACTIVE_KAGA_DB_V1';
function loadDB(){try{var s=localStorage.getItem(DB_KEY);if(s)return JSON.parse(s);}catch(e){}return JSON.parse(JSON.stringify(SEED));}
function saveDB(){try{localStorage.setItem(DB_KEY,JSON.stringify(DB));}catch(e){}}
var DB=loadDB();
function injectDB(html){html=String(html).split('<'+'\\'+'/script>').join('<'+'/script>').split('<'+'\\'+'/style>').join('<'+'/style>');var tag='<script>window.__DB__='+JSON.stringify(DB).replace(/<\//g,'<\/')+';'+'<'+'/script>';return html.replace('</head>',tag+'</head>');}
window.addEventListener('message',function(ev){var d=ev.data||{};
 if(d.type==='PROACTIVE_DB'&&d.db){DB=d.db;saveDB();}
 else if(d.type==='PROACTIVE_EXPORT'){try{var blob=new Blob([d.content],{type:d.mime||'text/plain'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=d.filename||'export.txt';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},1500);}catch(e){}}
});

function wireMaps(){
  try{
    var d=viewer.contentDocument; if(!d) return;
    var panels=[].slice.call(d.querySelectorAll('.map-panel'));
    var tabs=[].slice.call(d.querySelectorAll('.rtab'));
    var rows=[]; for(var n=0;n<8;n++){var r=d.getElementById('r'+n); if(r) rows.push(r);} 
    if(!panels.length || (!tabs.length && !rows.length)) return;
    var labels=['طريق المطار 539 — المحور الرئيسي','طريق أنس بن مالك — محور رئيسي سالك','مدخل الجامعة — تباطؤ متوسط','محطة المترو F1 — مسار نشط','نقطة 3 — مسار الوصول','نقطة 4 — مسار بديل','نقطة 5 — مسار داعم','نقطة 6 — نقطة مراقبة'];
    function swMap(i){
      i=Number(i)||0;
      panels.forEach(function(p,k){p.classList.toggle('active',k===i);p.style.display=(k===i?'block':'none');});
      tabs.forEach(function(t,k){t.classList.toggle('on',k===i);});
      rows.forEach(function(r,k){r.classList.toggle('on',k===i);});
      var hud=d.getElementById('hudS'); if(hud) hud.textContent=labels[i]||labels[0];
    }
    tabs.forEach(function(t,i){t.onclick=function(e){e.preventDefault();e.stopPropagation();swMap(i);return false;};});
    rows.forEach(function(r,i){r.onclick=function(e){e.preventDefault();e.stopPropagation();swMap(i);return false;};});
    d.defaultView.sw=swMap;
    swMap(0);
  }catch(e){}
}

function show(i){current=Math.max(0,Math.min(pages.length-1,i));viewer.onload=wireMaps;viewer.srcdoc=injectDB(pages[current].html);setTimeout(wireMaps,120);nav.forEach((b,k)=>b.classList.toggle('active',k===current));document.getElementById('title').textContent=pages[current].title;document.getElementById('count').textContent=String(current+1).padStart(2,'0')+' / '+String(pages.length).padStart(2,'0');closeDrawer();}
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('shade').classList.add('show')}function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('shade').classList.remove('show')}
nav.forEach((b,i)=>b.onclick=()=>show(i));document.getElementById('next').onclick=()=>show(current+1);document.getElementById('prev').onclick=()=>show(current-1);document.getElementById('menu').onclick=openDrawer;document.getElementById('shade').onclick=closeDrawer;document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')show(current+1);if(e.key==='ArrowRight')show(current-1);if(e.key==='Escape')closeDrawer();});
var __appStarted=false;function startApp(){if(__appStarted)return;__appStarted=true;try{show(0);}catch(e){console.error('Start error',e);}}
