ة</div>\n      <div class=\"step\"><b>المترو F1</b>مشاة</div>\n      <div class=\"step\"><b>📍 نقطة 3</b>13 د</div>\n      <div class=\"step\"><b>📍 نقطة 4</b>8 د</div>\n      <div class=\"step\"><b>📍 نقطة 5</b>6 د</div>\n      <div class=\"step\"><b>📍 نقطة 6</b>9 د</div>\n    </div>\n  </div>\n  <div class=\"bar\"><h3>مهمة عند الاعتماد</h3>\n    <div class=\"steps\">\n      <div class=\"step\"><b>المسؤول</b>الحشود</div>\n      <div class=\"step\"><b>المهلة</b>10 دقائق</div>\n      <div class=\"step\"><b>الدليل</b>صورة + تحديث</div>\n    </div>\n  </div>\n</section>\n\n</div>\n<script>\nconst DATA = [\n  {hud:'طريق المطار 539 — المحور الرئيسي', fl1:'<b>طريق المطار 539</b><br><span style=\"color:#25d68b\">المحور الرئيسي للوصول</span>', fl3:'<b>المسارات البديلة</b><br><span style=\"color:#4cc9ff\">يتم اعتمادها من غرفة العمليات</span>', link:'https://maps.app.goo.gl/xrqNHSQzPoeYYmsz7', dec:'تجهيز التحويل الجزئي للمركبات إذا تجاوز ضغط مدخل الجامعة 75% أو زاد التأخير عن 8 دقائق.'},\n  {hud:'طريق أنس بن مالك — محور رئيسي سالك', fl1:'<b>طريق أنس بن مالك</b><br><span style=\"color:#25d68b\">محور رئيسي — سالك الآن</span>', fl3:'<b>الوصول عبر هذا المحور</b><br><span style=\"color:#25d68b\">مباشرة لمداخل الجامعة الغربية</span>', link:'https://www.google.com/maps/dir/?api=1&destination=Princess+Nourah+University+Riyadh&travelmode=driving', dec:'طريق أنس بن مالك سالك ومناسب للتوجيه.'},\n  {hud:'مدخل الجامعة — تباطؤ متوسط', fl1:'<b>مدخل جامعة الأميرة نورة</b><br><span style=\"color:#FFD25E\">تباطؤ متوسط عند البوابات</span>', fl3:'<b>بوابات الدخول</b><br><span style=\"color:#FFD25E\">الكثافة: متوسطة إلى مرتفعة</span>', link:'https://maps.app.goo.gl/xrqNHSQzPoeYYmsz7', dec:'الضغط على مدخل الجامعة متوسط — المتابعة مستمرة.'},\n  {hud:'محطة المترو F1 — مسار السيارة النشط', fl1:'<b>محطة المترو F1</b><br><span style=\"color:#4CC9FF\">مسار سيارة — نشط</span>', fl3:'<b>الممر المشاة</b><br><span style=\"color:#4CC9FF\">يصل مباشرة لمداخل المعرض</span>', link:'https://www.google.com/maps/search/Metro+Station+F1+Riyadh', dec:'محطة المترو F1 — مسار السيارة من المحطة إلى جامعة الأميرة نورة.'},\n  {hud:'نقطة 3 — مسار سلمان بن عبدالعزيز', fl1:'<b>📍 نقطة 3</b><br><span style=\"color:#25d68b\">مسار: سلمان بن عبدالعزيز → معرض الكتاب</span>', fl3:'<b>موقع جامعة الأميرة نورة</b><br><span style=\"color:#ffd25e\">المدخل الغربي للمعرض</span>', link:'https://maps.app.goo.gl/4c3xek6UR6nTLDfS7', dec:'نقطة 3 — مسار مناسب للقادمين من شمال الرياض.'},\n  {hud:'نقطة 4 — مسار بديل تحت المتابعة', fl1:'<b>📍 نقطة 4</b><br><span style=\"color:#4CC9FF\">مسار بديل — متابعة</span>', fl3:'<b>تحويلة مقترحة</b><br><span style=\"color:#4CC9FF\">تفعيل عند ارتفاع الضغط</span>', link:'https://www.google.com/maps/dir/?api=1&destination=Princess+Nourah+University+Riyadh&travelmode=driving', dec:'نقطة 4 — مسار بديل يتم تفعيله عند الحاجة.'},\n  {hud:'نقطة 5 — مسار وصول داعم', fl1:'<b>📍 نقطة 5</b><br><span style=\"color:#25d68b\">مسار وصول داعم</span>', fl3:'<b>الحالة التشغيلية</b><br><span style=\"color:#25d68b\">سالك حالياً</span>', link:'https://www.google.com/maps/search/Princess+Nourah+University+Riyadh', dec:'نقطة 5 — مسار داعم للوصول إلى موقع المعرض.'},\n  {hud:'نقطة 6 — نقطة مراقبة خارجية', fl1:'<b>📍 نقطة 6</b><br><span style=\"color:#25d68b\">نقطة مراقبة خارجية</span>', fl3:'<b>التوجيه المروري</b><br><span style=\"color:#25d68b\">سالك حالياً</span>', link:'https://www.google.com/maps/search/Riyadh+International+Book+Fair+Princess+Nourah+University', dec:'نقطة 6 — تستخدم كمؤشر داعم للمراقبة والتوجيه.'}\n];\n\nconst tabs = Array.from(document.querySelectorAll('.rtab'));\nconst rows = Array.from({length:8}, (_,i)=>document.getElementById('r'+i));\nconst frames = Array.from({length:8}, (_,i)=>document.getElementById('m'+i));\nconst panels = Array.from({length:8}, (_,i)=>document.getElementById('map'+i));\n\nfunction sw(i){\n  i = Number(i);\n  if (Number.isNaN(i) || i < 0 || i >= frames.length) return;\n  tabs.forEach((t,k)=>t.classList.toggle('on',k===i));\n  rows.forEach((r,k)=>{ if(r) r.classList.toggle('on',k===i); });\n  panels.forEach((p,k)=>{ if(p) p.classList.toggle('active',k===i); });\n  frames.forEach((f,k)=>{ if(f) f.classList.toggle('active',k===i); });\n  const d = DATA[i] || DATA[0];\n  const hudS=document.getElementById('hudS'), fl1=document.getElementById('fl1'), fl3=document.getElementById('fl3'), openLink=document.getElementById('openLink'), dec=document.getElementById('dec');\n  if(hudS) hudS.textContent=d.hud;\n  if(fl1) fl1.innerHTML=d.fl1;\n  if(fl3) fl3.innerHTML=d.fl3;\n  if(openLink) openLink.href=d.link;\n  if(dec) dec.textContent=d.dec;\n}\n\ntabs.forEach((t,i)=>t.addEventListener('click', function(e){e.preventDefault(); e.stopPropagation(); sw(i);}));\nrows.forEach((r,i)=>{ if(r) r.addEventListener('click', function(e){e.preventDefault(); e.stopPropagation(); sw(i);}); });\nsw(0);\nwindow.sw = sw;\n<\\/script>\n</body></html>"},{"num":"03","title":"مركز الامتثال لتجربة الزائر","html":"<!doctype html>\n<html lang=\"ar\" dir=\"rtl\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>مركز الامتثال لتجربة الزائر</title>\n<link href=\"https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap\" rel=\"stylesheet\">\n<style>\n:root{--line:rgba(154,111,255,.25);--line2:rgba(255,255,255,.08);--ink:#f7f3ff;--muted:#aab4cf;--purple:#7B3DFF;--gold:#D7B15E;--green:#25D68B;--red:#FF4D67;--yellow:#FFD25E;--blue:#4CC9FF;--orange:#ff8b3d}\n*{box-sizing:border-box}body{margin:0;height:100vh;overflow:hidden;background:radial-gradient(circle at 50% -20%,rgba(123,61,255,.20),transparent 32%),linear-gradient(180deg,#030711,#071025);color:var(--ink);font-family:'IBM Plex Sans Arabic',Tahoma,Arial,sans-serif}\nbody:before{content:\"\";position:fixed;inset:0;background:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:38px 38px;pointer-events:none;mask-image:radial-gradient(circle at center,black,transparent 80%)}\n.screen{height:100vh;padding:14px;display:grid;grid-template-columns:300px 1fr 300px;grid-template-rows:74px 1fr 136px;gap:12px}\n.glass{background:linear-gradient(180deg,rgba(14,26,51,.90),rgba(5,12,27,.90));border:1px solid var(--line2);border-radius:20px;box-shadow:0 22px 70px rgba(0,0,0,.46);backdrop-filter:blur(14px);position:relative;overflow:hidden}\n.glass:before{content:\"\";position:absolute;inset:0;background:linear-gradient(130deg,rgba(123,61,255,.10),transparent 44%,rgba(76,201,255,.045));pointer-events:none}\n.top{grid-column:1/4;display:flex;align-items:center;justify-content:space-between;padding:12px 18px}\n.brand{display:flex;align-items:center;gap:12px}.mark{width:46px;height:50px;border-radius:14px;background:linear-gradient(145deg,#7b3dff,#201057);display:grid;place-items:center;font-weight:900;font-size:21px;box-shadow:0 0 28px rgba(123,61,255,.38)}\n.brand h1{margin:0;font-size:20px}.brand small{display:block;color:var(--muted);font-size:11px}\n.headline{text-align:center}.headline h2{font-size:28px;margin:0;line-height:1;font-weight:900}.headline p{margin:7px 0 0;color:var(--muted);font-size:13px}\n.now{display:flex;gap:8px}.pill{background:rgba(255,255,255,.045);border:1px solid var(--line2);border-radius:14px;padding:8px 11px;font-size:12px;color:var(--muted)}.pill b{color:var(--ink)}\n.side{padding:14px;display:flex;flex-direction:column;gap:10px}\n.sec-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}.sec-title h3{font-size:13px;margin:0;color:var(--ink)}\n.kpi{padding:12px;border:1px solid var(--line2);border-radius:16px;background:rgba(255,255,255,.035)}\n.kpi small{display:block;color:var(--muted);font-size:11px}.kpi b{display:block;font-size:26px;line-height:1.1;margin:5px 0}.kpi em{font-style:normal;color:var(--muted);font-size:11px}\n.greenline{border-color:rgba(37,214,139,.35)}.redline{border-color:rgba(255,77,103,.35)}.yellowline{border-color:rgba(255,210,94,.35)}.blueline{border-color:rgba(76,201,255,.35)}\n.badge{border-radius:999px;padding:3px 9px;font-size:10px;font-weight:900;white-space:nowrap}\n.b-green{background:rgba(37,214,139,.15);color:#62edb0}.b-red{background:rgba(255,77,103,.16);color:#ff7c90}.b-yellow{background:rgba(255,210,94,.16);color:#ffe07b}.b-blue{background:rgba(76,201,255,.16);color:#89ddff}.b-purple{background:rgba(123,61,255,.20);color:#c4a4ff}\n.main{padding:12px;display:flex;flex-direction:column;gap:12px}\n.criteria-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;flex:1}\n.crit-card{border:1px solid var(--line2);border-radius:16px;background:rgba(255,255,255,.032);padding:12px;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden}\n.crit-card:before{content:\"\";position:absolute;top:0;right:0;width:3px;height:100%;border-radius:0 16px 16px 0}\n.crit-card.green:before{background:var(--green)}.crit-card.red:before{background:var(--red)}.crit-card.yellow:before{background:var(--yellow)}.crit-card.blue:before{background:var(--blue)}\n.crit-header{display:flex;align-items:center;justify-content:space-between}\n.crit-icon{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:16px}\n.crit-title{font-size:12px;font-weight:700;margin:2px 0}.crit-desc{font-size:11px;color:var(--muted);line-height:1.5}\n.progress-bar{height:5px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden}\n.progress-fill{height:100%;border-radius:4px;transition:.4s}\n.fill-green{background:linear-gradient(90deg,#25D68B,#1fa870)}.fill-yellow{background:linear-gradient(90deg,#FFD25E,#e6b840)}.fill-red{background:linear-gradient(90deg,#FF4D67,#d43050)}.fill-blue{background:linear-gradient(90deg,#4CC9FF,#2bb5f0)}\n.crit-footer{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--muted)}\n.bottom-panels{grid-column:1/4;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}\n.panel{padding:12px 14px}.panel h4{font-size:12px;margin:0 0 10px;color:#c4b1ff}\n.row-item{display:grid;grid-template-columns:1fr auto;gap:6px;align-items:center;padding:6px 8px;border:1px solid rgba(255,255,255,.07);border-radius:11px;background:rgba(255,255,255,.028);font-size:11px;margin-bottom:6px}\n.row-item:last-child{margin-bottom:0}\n.donut-wrap{display:flex;align-items:center;gap:14px}\n.donut-legend{display:flex;flex-direction:column;gap:6px;font-size:11px}\n.legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-left:6px}\n.alert-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:10px;font-size:11px;margin-bottom:5px}\n.alert-item:last-child{margin-bottom:0}\n.alert-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}\n</style></head><body>\n<div class=\"screen\">\n\n  <!-- TOP BAR -->\n  <div class=\"glass top\">\n    <div class=\"brand\">\n      <div class=\"mark\">P</div>\n      <div><h1>PROACTIVE</h1><small>المنصة الاستباقية - معرض الكتاب</small></div>\n    </div>\n    <div class=\"headline\">\n      <h2>مركز الامتثال لتجربة الزائر</h2>\n      <p>رصد ومتابعة معايير الجودة وتجربة الزوار لحظةً بلحظة</p>\n    </div>\n    <div class=\"now\">\n      <div class=\"pill\">امتثال كلي <b>87%</b></div>\n      <div class=\"pill\">بلاغات مفتوحة <b>5</b></div>\n      <div class=\"pill\">رضا الزوار <b>4.3 / 5</b></div>\n    </div>\n  </div>\n\n  <!-- RIGHT SIDE -->\n  <div class=\"glass side\">\n    <div class=\"sec-title\"><h3>📊 مؤشرات الامتثال</h3></div>\n    <div class=\"kpi greenline\">\n      <small>نسبة الامتثال الكلية</small>\n      <b>87%</b>\n      <em>↑ 3% عن أمس</em>\n    </div>\n    <div class=\"kpi yellowline\">\n      <small>معايير تحت المراجعة</small>\n      <b>4</b>\n      <em>تستدعي متابعة فورية</em>\n    </div>\n    <div class=\"kpi greenline\">\n      <small>معايير ممتثلة بالكامل</small>\n      <b>18</b>\n      <em>من إجمالي 22 معيار</em>\n    </div>\n    <div class=\"kpi redline\">\n      <small>مخالفات م "><div class=\"progress-fill fill-yellow\" style=\"width:74%\"></div></div>\n        <div class=\"crit-footer\"><span>74% امتثال</span><span>⚠ بلاغ مفتوح</span></div>\n      </div>\n\n      <div class=\"crit-card green\">\n        <div class=\"crit-header\">\n          <div class=\"crit-icon\" style=\"background:rgba(37,214,139,.15)\">♿</div>\n          <span class=\"badge b-green\">ممتثل</span>\n        </div>\n        <div class=\"crit-title\">إمكانية الوصول</div>\n        <div class=\"crit-desc\">ذوو الاحتياجات الخاصة، المشايات، الكراسي</div>\n        <div class=\"progress-bar\"><div class=\"progress-fill fill-green\" style=\"width:96%\"></div></div>\n        <div class=\"crit-footer\"><span>96% امتثال</span><span>آخر فحص: 09:45 ص</span></div>\n      </div>\n\n      <div class=\"crit-card yellow\">\n        <div class=\"crit-header\">\n          <div class=\"crit-icon\" style=\"background:rgba(255,210,94,.15)\">🍽</div>\n          <span class=\"badge b-yellow\">مراجعة</span>\n        </div>\n        <div class=\"crit-title\">الأغذية والمطاعم</div>\n        <div class=\"crit-desc\">جودة الخدمة، الأسعار، الطاقة الاستيعابية</div>\n        <div class=\"progress-bar\"><div class=\"progress-fill fill-yellow\" style=\"width:70%\"></div></div>\n        <div class=\"crit-footer\"><span>70% امتثال</span><span>⚠ ازدحام مُبلَّغ</span></div>\n      </div>\n\n      <div class=\"crit-card red\">\n        <div class=\"crit-header\">\n          <div class=\"crit-icon\" style=\"background:rgba(255,77,103,.15)\">🔒</div>\n          <span class=\"badge b-red\">تدخل مطلوب</span>\n        </div>\n        <div class=\"crit-title\">الأمن والسلامة</div>\n        <div class=\"crit-desc\">نقاط التفتيش، مخارج الطوارئ، الكاميرات</div>\n        <div class=\"progress-bar\"><div class=\"progress-fill fill-red\" style=\"width:62%\"></div></div>\n        <div class=\"crit-footer\"><span>62% امتثال</span><span>🔴 إجراء عاجل</span></div>\n      </div>\n\n    </div>\n  </div>\n\n  <!-- LEFT SIDE -->\n  <div class=\"glass side\">\n    <div class=\"sec-title\"><h3>⭐ رضا الزوار</h3></div>\n    <div class=\"kpi\">\n      <small>التقييم العام</small>\n      <b>4.3 / 5</b>\n      <em>من 1,248 تقييم اليوم</em>\n    </div>\n    <div style=\"display:flex;flex-direction:column;gap:6px;margin-top:4px\">\n      <div style=\"display:flex;align-items:center;gap:8px;font-size:11px\">\n        <span style=\"color:var(--muted);width:80px\">التنظيم</span>\n        <div class=\"progress-bar\" style=\"flex:1\"><div class=\"progress-fill fill-green\" style=\"width:88%\"></div></div>\n        <span>4.4</span>\n      </div>\n      <div style=\"display:flex;align-items:center;gap:8px;font-size:11px\">\n        <span style=\"color:var(--muted);width:80px\">الخدمات</span>\n        <div class=\"progress-bar\" style=\"flex:1\"><div class=\"progress-fill fill-green\" style=\"width:84%\"></div></div>\n        <span>4.2</span>\n      </div>\n      <div style=\"display:flex;align-items:center;gap:8px;font-size:11px\">\n        <span style=\"color:var(--muted);width:80px\">النظافة</span>\n        <div class=\"progress-bar\" style=\"flex:1\"><div class=\"progress-fill fill-yellow\" style=\"width:72%\"></div></div>\n        <span>3.6</span>\n      </div>\n      <div style=\"display:flex;align-items:center;gap:8px;font-size:11px\">\n        <span style=\"color:var(--muted);width:80px\">الأمن</span>\n        <div class=\"progress-bar\" style=\"flex:1\"><div class=\"progress-fill fill-yellow\" style=\"width:76%\"></div></div>\n        <span>3.8</span>\n      </div>\n      <div style=\"display:flex;align-items:center;gap:8px;font-size:11px\">\n        <span style=\"color:var(--muted);width:80px\">إمكانية الوصول</span>\n        <div class=\"progress-bar\" style=\"flex:1\"><div class=\"progress-fill fill-green\" style=\"width:92%\"></div></div>\n        <span>4.6</span>\n      </div>\n    </div>\n    <div class=\"sec-title\" style=\"margin-top:10px\"><h3>🔔 آخر البلاغات</h3></div>\n    <div style=\"display:flex;flex-direction:column;gap:5px\">\n      <div class=\"alert-item\" style=\"background:rgba(255,77,103,.08)\">\n        <div class=\"alert-dot\" style=\"background:var(--red)\"></div>\n        <div style=\"flex:1\">باب B3 — ازدحام شديد</div>\n        <span class=\"badge b-red\">عاجل</span>\n      </div>\n      <div class=\"alert-item\" style=\"background:rgba(255,210,94,.08)\">\n        <div class=\"alert-dot\" style=\"background:var(--yellow)\"></div>\n        <div style=\"flex:1\">قاعة 7 — تكييف ضعيف</div>\n        <span class=\"badge b-yellow\">متابعة</span>\n      </div>\n      <div class=\"alert-item\" style=\"background:rgba(255,210,94,.08)\">\n        <div class=\"alert-dot\" style=\"background:var(--yellow)\"></div>\n        <div style=\"flex:1\">مطعم المنطقة ب — طوابير</div>\n        <span class=\"badge b-yellow\">متابعة</span>\n      </div>\n      <div class=\"alert-item\" style=\"background:rgba(37,214,139,.08)\">\n        <div class=\"alert-dot\" style=\"background:var(--green)\"></div>\n        <div style=\"flex:1\">مدخل الرئيسي — حُل</div>\n        <span class=\"badge b-green\">مغلق</span>\n      </div>\n    </div>\n  </div>\n\n  <!-- BOTTOM PANELS -->\n  <div class=\"bottom-panels\">\n    <div class=\"glass panel\">\n      <h4>📋 قائمة الفحص اليومي</h4>\n      <div class=\"row-item\"><span>فحص منافذ الدخول</span><span class=\"badge b-green\">✓ مكتمل</span></div>\n      <div class=\"row-item\"><span>جولة النظافة المسائية</span><span class=\"badge b-green\">✓ مكتمل</span></div>\n      <div class=\"row-item\"><span>اختبار الكاميرات الأمنية</span><span class=\"badge b-red\">✗ معلق</span></div>\n      <div class=\"row-item\"><span>فحص مخارج الطوارئ</span><span class=\"badge b-yellow\">⏳ جارٍ</span></div>\n      <div class=\"row-item\"><span>تفعيل نقاط الاستفسار</span><span class=\"badge b-green\">✓ مكتمل</span></div>\n    </div>\n    <div class=\"glass panel\">\n      <h4>👥 توزيع البلاغات حسب القطاع</h4>\n      <div class=\"row-item\"><span>🚪 المداخل والمخارج</span><span class=\"badge b-red\">2 بلاغ</span></div>\n      <div class=\"row-item\"><span>🧹 النظافة</span><span class=\"badge b-yellow\">1 بلاغ</span></div>\n      <div class=\"row-item\"><span>🍽 الأغذية</span><span class=\"badge b-yellow\">1 بلاغ</span></div>\n      <div class=\"row-item\"><span>❄ التكييف</span><span class=\"badge b-yellow\">1 بلاغ</span></div>\n      <div class=\"row-item\"><span>♿ إمكانية الوصول</span><span class=\"badge b-green\">0 بلاغ</span></div>\n    </div>\n    <div class=\"glass panel\">\n      <h4>📈 مسار الامتثال — آخر 6 ساعات</h4>\n      <div style=\"display:flex;align-items:flex-end;gap:6px;height:72px;padding-top:8px\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;flex:1\">\n          <div style=\"background:rgba(37,214,139,.5);width:100%;border-radius:4px 4px 0 0\" style=\"height:56px;background:rgba(37,214,139,.5);width:100%;border-radius:4px 4px 0 0\"></div>\n          <span style=\"font-size:9px;color:var(--muted)\">07ص</span>\n        </div>\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;flex:1\">\n          <div style=\"background:rgba(37,214,139,.5);width:100%;border-radius:4px 4px 0 0\" style=\"height:59px;background:rgba(37,214,139,.5);width:100%;border-radius:4px 4px 0 0\"></div>\n          <span style=\"font-size:9px;color:var(--muted)\">08ص</span>\n        </div>\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;flex:1\">\n          <div style=\"background:rgba(255,210,94,.5);width:100%;border-radius:4px 4px 0 0\" style=\"height:54px;background:rgba(255,210,94,.5);width:100%;border-radius:4px 4px 0 0\"></div>\n          <span style=\"font-size:9px;color:var(--muted)\">09ص</span>\n        </div>\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;flex:1\">\n          <div style=\"background:rgba(37,214,139,.5);width:100%;border-radius:4px 4px 0 0\" style=\"height:60px;background:rgba(37,214,139,.5);width:100%;border-radius:4px 4px 0 0\"></div>\n          <span style=\"font-size:9px;color:var(--muted)\">10ص</span>\n        </div>\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;flex:1\">\n          <div style=\"background:rgba(37,214,139,.5);width:100%;border-radius:4px 4px 0 0\" style=\"height:63px;background:rgba(37,214,139,.5);width:100%;border-radius:4px 4px 0 0\"></div>\n          <span style=\"font-size:9px;color:var(--muted)\">11ص</span>\n        </div>\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;flex:1\">\n          <div style=\"background:rgba(37,214,139,.6);width:100%;border-radius:4px 4px 0 0;border:1px solid var(--green)\" style=\"height:63px;background:rgba(37,214,139,.5);width:100%;border-radius:4px 4px 0 0\"></div>\n          <span style=\"font-size:9px;color:var(--green)\">الآن</span>\n        </div>\n      </div>\n      <script>\n        document.querySelectorAll('[data-h]').forEach(el=>{\n          const pct = parseInt(el.getAttribute('data-h'));\n          el.style.height = (pct * 0.72) + 'px';\n        });\n      <\\/script>\n    </div>\n  </div>\n\n</div>\n</body></html>"},{"num":"04","title":"مركز قياس تجربة الزائر","html":"<!doctype html>\n<html lang=\"ar\" dir=\"rtl\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>مركز قياس تجربة الزائر</title>\n<link href=\"https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap\" rel=\"stylesheet\">\n<style>\n:root{--bg:#030711;--line:rgba(154,111,255,.25);--line2:rgba(255,255,255,.08);--ink:#f7f3ff;--muted:#aab4cf;--purple:#7B3DFF;--green:#25D68B;--red:#FF4D67;--yellow:#FFD25E;--blue:#4CC9FF;--orange:#FF8B3D}\n*{box-sizing:border-box;margin:0;padding:0}\nbody{height:100vh;overflow:hidden;background:radial-gradient(circle at 50% -20%,rgba(123,61,255,.18),transparent 32%),linear-gradient(180deg,#030711,#071025);color:var(--ink);font-family:'IBM Plex Sans Arabic',Tahoma,Arial,sans-serif;font-size:13px}\nbody:before{content:\"\";position:fixed;inset:0;background:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:38px 38px;pointer-events:none;mask-image:radial-gradient(circle at center,black,transparent 80%)}\n.wrap{height:100vh;display:flex;flex-direction:column;padding:12px;gap:10px;overflow:hidden}\n.glass{background:linear-gradient(180deg,rgba(14,26,51,.92),rgba(5,12,27,.92));border:1px solid var(--line2);border-radius:18px;backdrop-filter:blur(14px);position:relative;overflow:hidden}\n.glass:before{content:\"\";position:absolute;inset:0;background:linear-gradient(130deg,rgba(123,61,255,.08),transparent 44%,rgba(76,201,255,.04));pointer-events:none}\n\n/* TOP BAR */\n.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;flex-shrink:0}\n.brand{display:flex;align-items:center;gap:10px}\n.mark{width:40px;height:44px;border-radius:12px;background:linear-gradient(145deg,#7b3dff,#201057);display:grid;place-items:center;font-weight:900;font-size:18px;box-shadow:0 0 22px rgba(123,61,255,.38)}\n.brand h1{font-size:17px;font-weight:800}\n.brand small{display:block;color:var(--muted);font-size:10px;margin-top:1px}\n.page-title{text-align:center}\n.page-title h2{font-size:22px;font-weight:900}\n.page-title p{color:var(--muted);font-size:11px;margin-top:4px}\n.mode-tabs{display:flex;gap:6px}\n.mtab{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04);color:var(--muted);border-radius:10px;padding:6px 12px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:.15s}\n.mtab:hover{border-color:rgba(123,61,255,.4);color:var(--ink)}\n.mtab.on{background:rgba(123,61,255,.22);border-color:rgba(123,61,255,.6);color:var(--ink)}\n\n/* KPI CARDS ROW */\n.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;flex-shrink:0}\n.kcard{padding:10px 12px;border-radius:14px;border:1px solid var(--line2);background:rgba(255,255,255,.03);text-align:center;cursor:pointer;transition:.15s}\n.kcard:hover{border-color:rgba(123,61,255,.4)}\n.kcard .kval{font-size:22px;font-weight:900;line-height:1;margin:4px 0}\n.kcard .klbl{font-size:10px;color:var(--muted)}\n.kcard .ksub{font-size:10px;margin-top:3px}\n.k-green{border-color:rgba(37,214,139,.35)!important}.k-green .kval{color:var(--green)}\n.k-yellow{border-color:rgba(255,210,94,.35)!important}.k-yellow .kval{color:var(--yellow)}\n.k-red{border-color:rgba(255,77,103,.35)!important}.k-red .kval{color:var(--red)}\n.k-orange{border-color:rgba(255,139,61,.35)!important}.k-orange .kval{color:var(--orange)}\n.k-purple{border-color:rgba(123,61,255,.45)!important}.k-purple .kval{color:#c4a4ff}\n\n/* MAIN AREA */\n.main-area{display:grid;gap:10px;flex:1;overflow:hidden}\n.mode-panel{display:none;height:100%;overflow:hidden}\n.mode-panel.active{display:grid}\n\n/* MODE 1 - MORNING */\n#m1{grid-template-columns:260px 1fr 220px;grid-template-rows:1fr}\n.checklist-panel{overflow-y:auto;padding:12px}\n.cl-section{margin-bottom:12px}\n.cl-title{font-size:11px;font-weight:700;color:#c4b1ff;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.06)}\n.cl-item{display:grid;grid-template-columns:1fr auto auto;gap:6px;align-items:center;padding:6px 8px;border:1px solid rgba(255,255,255,.06);border-radius:10px;background:rgba(255,255,255,.025);margin-bottom:5px;font-size:11px}\n.cl-item.ready{border-color:rgba(37,214,139,.25)}\n.cl-item.watch{border-color:rgba(255,210,94,.25)}\n.cl-item.notready{border-color:rgba(255,77,103,.25)}\n.badge{border-radius:999px;padding:2px 8px;font-size:9px;font-weight:700;white-space:nowrap}\n.bg{background:rgba(37,214,139,.14);color:#62edb0}\n.by{background:rgba(255,210,94,.14);color:#ffe07b}\n.br{background:rgba(255,77,103,.15);color:#ff7c90}\n.bo{background:rgba(255,139,61,.14);color:#ffb07b}\n.bp         </div>\n        <div class=\"night-item\">\n          <div class=\"ni-head\"><span>🧒 تجهيز منطقة الأطفال</span><span class=\"badge br\">أولوية 2</span></div>\n          <div class=\"ni-body\">إضافة 3 متطوعين + كراسي عائلات + منطقة رضاعة · المالك: فريق الاستقبال · الموعد: 07:00 ص · الأثر: +18% على رضا العائلات</div>\n        </div>\n        <div class=\"night-item\">\n          <div class=\"ni-head\"><span>🚻 تنظيف دورات المياه</span><span class=\"badge by\">أولوية 3</span></div>\n          <div class=\"ni-body\">جولة تنظيف شاملة + تجديد المستلزمات · المالك: فريق النظافة · الموعد: 05:00 ص · الأثر: +12% على مؤشر النظافة</div>\n        </div>\n        <div class=\"night-item\">\n          <div class=\"ni-head\"><span>ℹ تعزيز الاستعلامات</span><span class=\"badge by\">أولوية 4</span></div>\n          <div class=\"ni-body\">إضافة نقطة استعلامات عند الجناح الشرقي + تدريب فريق على إدارة الضغط · الموعد: 07:30 ص</div>\n        </div>\n        <div class=\"night-item\">\n          <div class=\"ni-head\"><span>👴 نقاط راحة كبار السن</span><span class=\"badge by\">أولوية 5</span></div>\n          <div class=\"ni-body\">إضافة 5 مقاعد راحة عند المسارات الطويلة + لافتات توجيه · الموعد: 06:30 ص</div>\n        </div>\n        <div class=\"night-item\">\n          <div class=\"ni-head\"><span>🎫 اختبار ماسحات التذاكر</span><span class=\"badge bg\">أولوية 6</span></div>\n          <div class=\"ni-body\">اختبار كامل لجميع البوابات قبل الافتتاح · المالك: فريق التقنية · الموعد: 07:00 ص</div>\n        </div>\n      </div>\n\n      <div class=\"tomorrow-card\">\n        <div class=\"section-title\" style=\"color:var(--green)\">🌅 نبدأ الغد من نقطة قوة</div>\n        <div class=\"tc-item\">\n          <div class=\"tc-num\">1</div>\n          <div><b>أهم إجراء الليلة:</b> إكمال مسار ذوي الإعاقة + تجهيز منطقة الأطفال<br><span style=\"color:var(--muted);font-size:10px\">هذان الإجراءان يؤثران على 3 فئات حساسة</span></div>\n        </div>\n        <div class=\"tc-item\">\n          <div class=\"tc-num\">2</div>\n          <div><b>الأثر المتوقع:</b> ارتفاع التقييم الكلي من 81% إلى 90%+<br><span style=\"color:var(--muted);font-size:10px\">إذا أُغلقت جميع الإجراءات الليلية قبل 07:30 ص</span></div>\n        </div>\n        <div class=\"tc-item\">\n          <div class=\"tc-num\">3</div>\n          <div><b>أول منطقة ستتحسن:</b> ذوو الإعاقة والأطفال والعائلات<br><span style=\"color:var(--muted);font-size:10px\">التحسن المتوقع: من 64% إلى 82%</span></div>\n        </div>\n      </div>\n    </div>\n  </div>\n\n</div><!-- end main-area -->\n\n<!-- BOTTOM BAR -->\n<div class=\"bot-bar\">\n  <div class=\"glass bot-panel\">\n    <h4>📊 النظام التشغيلي</h4>\n    <div class=\"bot-row\"><span>الوصول والمواقف</span><span style=\"color:var(--green)\">13.8/15</span></div>\n    <div class=\"bot-row\"><span>التسجيل والتذاكر</span><span style=\"color:var(--green)\">9.5/10</span></div>\n    <div class=\"bot-row\"><span>الإرشاد واللوحات</span><span style=\"color:var(--green)\">12.0/15</span></div>\n    <div class=\"bot-row\"><span>ذوو الإعاقة وكبار السن</span><span style=\"color:var(--red)\">6.4/10</span></div>\n  </div>\n  <div class=\"glass bot-panel\">\n    <h4>📈 أداء اليوم</h4>\n    <div class=\"bot-row\"><span>النظافة والراحة</span><span style=\"color:var(--yellow)\">9.2/12</span></div>\n    <div class=\"bot-row\"><span>جودة التعامل</span><span style=\"color:var(--green)\">10.8/12</span></div>\n    <div class=\"bot-row\"><span>العائلات والأطفال</span><span style=\"color:var(--red)\">4.1/6</span></div>\n    <div class=\"bot-row\"><span>VIP والوفود</span><span style=\"color:var(--green)\">3.9/4</span></div>\n  </div>\n  <div class=\"glass bot-panel\">\n    <h4>🔔 محرك التنبيه</h4>\n    <div class=\"bot-row\"><span>🔴 ذوو الإعاقة</span><span class=\"badge br\">64% تنبيه أحمر</span></div>\n    <div class=\"bot-row\"><span>🔴 الأطفال والعائلات</span><span class=\"badge br\">68% تنبيه أحمر</span></div>\n    <div class=\"bot-row\"><span>🟡 دورات المياه</span><span class=\"badge by\">77% تنبيه أصفر</span></div>\n    <div class=\"bot-row\"><span>🟡 الاستعلامات</span><span class=\"badge by\">79% تنبيه أصفر</span></div>\n  </div>\n  <div class=\"glass bot-panel\">\n    <h4>📤 تصدير التقارير</h4>\n    <div class=\"export-row\">\n      <button class=\"exp-btn\" onclick=\"alert('جاري تصدير تقرير العصر...')\">🌅 تقرير العصر</button>\n      <button class=\"exp-btn\" onclick=\"alert('جاري تصدير تقرير النهاية...')\">🌙 تقرير النهاية</button>\n      <button class=\"exp-btn\" onclick=\"alert('جاري تصدير خطة الليلة...')\">📋 خطة الليلة</button>\n      <button class=\"exp-btn\" onclick=\"alert('جاري تصدير الملخص...')\">📊 ملخص تنفيذي</button>\n      <button class=\"exp-btn\" onclick=\"alert('تصدير PowerPoint قريباً...')\">🎯 PowerPoint</button>\n    </div>\n  </div>\n</div>\n\n</div><!-- end wrap -->\n\n<script>\nfunction setMode(n){\n  document.querySelectorAll('.mtab').forEach((t,i)=>t.classList.toggle('on',i===n-1));\n  document.querySelectorAll('.mode-panel').forEach((p,i)=>p.classList.toggle('active',i===n-1));\n}\n\n// نظام التنبيه التلقائي\nconst zones = [{name:'ذوو الإعاقة',score:64},{name:'الأطفال والعائلات',score:68},{name:'دورات المياه',score:77},{name:'الاستعلامات',score:79}];\nzones.forEach(z=>{\n  if(z.score<75) console.warn(`🔴 تنبيه أحمر: ${z.name} = ${z.score}%`);\n  else if(z.score<85) console.warn(`🟡 تنبيه أصفر: ${z.name} = ${z.score}%`);\n});\n\n// حساب النتيجة الكلية\nfunction calcScore(){\n  const weights={access:15,tickets:10,guidance:15,entry:12,clean:12,service:12,disabled:10,family:6,intl:4,vip:4};\n  const scores={access:92,tickets:95,guidance:88,entry:85,clean:77,service:88,disabled:64,family:68,intl:90,vip:97};\n  let total=0;\n  Object.keys(weights).forEach(k=>{ total += (scores[k]/100)*weights[k]; });\n  return Math.round(total);\n}\ndocument.getElementById('k2').textContent = calcScore()+'%';\n<\\/script>\n</body></html>\n"},{"num":"05","title":"مركز قيادة الوحدات التشغيلية","html":"<!doctype html>\n<html lang=\"ar\" dir=\"rtl\"><hea String();\n    if(/حرج|إجراء|تعارض|فوري|متأخ|خطر|أحمر|نقص/.test(t))return 'b-red';\n    if(/متابعة|تأكيد|بلاغ|مراجعة|تجهيز|بانتظار|انتظار|تحذير|قيد/.test(t))return 'b-yellow';\n    if(/مستقر|جاهز|معتمد|ملتزم|ناجح|اكتمل|^تم/.test(t))return 'b-green';\n    if(/نشط|مراقبة|مخصص/i.test(t))return 'b-blue';\n    return 'b-blue';}\n  var T={\n    units:function(r){return '<tr><td>'+esc(r.code)+'</td><td>'+esc(r.unit)+'</td><td>'+esc(r.owner)+'</td><td>'+esc(r.priority)+'</td><td><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></td><td>'+esc(r.updated)+'</td></tr>';},\n    zones:function(r){var p=parseInt(r.probability)||0;var c=p>=80?'b-red':(p>=70?'b-yellow':'b-blue');return '<tr><td>'+esc(r.zone)+'</td><td>'+esc(r.indicator)+'</td><td><span class=\"badge '+c+'\">'+esc(r.probability)+'%</span></td><td>'+esc(r.decision)+'</td></tr>';},\n    support:function(r){return '<tr><td>'+esc(r.dest)+'</td><td>'+esc(r.need)+'</td><td>'+esc(r.source)+'</td><td>'+esc(r.deadline)+'</td><td><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></td></tr>';},\n    lessons:function(r){return '<div class=\"lesson\"><div class=\"doc\">📄</div><span>'+esc(r.title)+'</span><span>›</span></div>';},\n    officialVisits:function(r){return '<div class=\"visit\"><div class=\"time\">'+esc(r.time)+'</div><div class=\"vtitle\"><b>'+esc(r.title)+'</b><small>'+esc(r.route)+'</small></div><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></div>';},\n    schoolVisits:function(r){return '<div class=\"visit\"><div class=\"time\">'+esc(r.time)+'</div><div class=\"vtitle\"><b>'+esc(r.school)+'</b><small>'+esc(r.students)+' طالب · '+esc(r.supervisors)+' مشرفين · '+esc(r.hall)+'</small></div><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></div>';},\n    reports:function(r){return '<div class=\"report\"><b>'+esc(r.name)+'</b><p>'+esc(r.desc)+'</p><span class=\"badge '+(r.badge||badge(r.type))+'\">'+esc(r.type)+'</span></div>';}\n  };\n  function num(v){return (v==null||v==='')?'—':v;}\n  function render(){\n    var nodes=document.querySelectorAll('[data-bind]');\n    for(var i=0;i<nodes.length;i++){var el=nodes[i];var k=el.getAttribute('data-bind');var rows=DB[k]||[];var tpl=T[k];if(!tpl)continue;\n      var pre=el.className.indexOf('timeline')>=0?'<div class=\"line\"></div>':'';\n      el.innerHTML=pre+rows.map(tpl).join('');}\n    var ks=document.querySelectorAll('[data-kpi]');\n    for(var j=0;j<ks.length;j++){var e=ks[j];try{var v=Function('DB','return ('+e.getAttribute('data-kpi')+');')(DB);e.textContent=num(v);}catch(err){}}\n  }\n  if(document.readyState!=='loading')render();else document.addEventListener('DOMContentLoaded',render);\n})();<\\/script></body></html>"},{"num":"06","title":"التنبيه المبكر للمناطق الحرجة","html":"<!doctype html><html lang=\"ar\" dir=\"rtl\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><title>التنبيه المبكر للمناطق الحرجة</title><link href=\"https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap\" rel=\"stylesheet\"><style>\n:root{--bg:#030711;--line:rgba(154,111,255,.25);--line2:rgba(255,255,255,.08);--ink:#f7f3ff;--muted:#aab4cf;--purple:#7B3DFF;--gold:#D7B15E;--green:#25D68B;--red:#FF4D67;--yellow:#FFD25E;--blue:#4CC9FF;--orange:#ff8b3d}\n*{box-sizing:border-box}body{margin:0;height:100vh;overflow:hidden;background:radial-gradient(circle at 50% -20%,rgba(123,61,255,.20),transparent 32%),linear-gradient(180deg,#030711,#071025);color:var(--ink);font-family:'IBM Plex Sans Arabic',Tahoma,Arial,sans-serif}body:before{content:\"\";position:fixed;inset:0;background:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:38px 38px;pointer-events:none;mask-image:radial-gradient(circle at center,black,transparent 80%)}\n.screen{height:100vh;padding:14px;display:grid;grid-template-columns:310px 1f ع التصاعد</h3><div class=\"steps\"><div class=\"step\"><b>المواقف</b>12 منظم</div><div class=\"step\"><b>البوابة</b>فتح مسار</div><div class=\"step\"><b>التوقيع</b>حواجز مرنة</div><div class=\"step\"><b>المترو</b>مراقبة</div></div></div><div class=\"bar\"><h3>إغلاق الإنذار</h3><div class=\"steps\"><div class=\"step\"><b>دليل</b>صورة تنفيذ</div><div class=\"step\"><b>قياس</b>بعد 10د</div><div class=\"step\"><b>اعتماد</b>غرفة العمليات</div></div></div></section>\n</div><script>(function(){\n  var DB=(window.__DB__)||{};\n  function esc(s){return String(s==null?'':s).replace(/[&<>\"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c];});}\n  function badge(t){t=(t||'').toString();\n    if(/حرج|إجراء|تعارض|فوري|متأخ|خطر|أحمر|نقص/.test(t))return 'b-red';\n    if(/متابعة|تأكيد|بلاغ|مراجعة|تجهيز|بانتظار|انتظار|تحذير|قيد/.test(t))return 'b-yellow';\n    if(/مستقر|جاهز|معتمد|ملتزم|ناجح|اكتمل|^تم/.test(t))return 'b-green';\n    if(/نشط|مراقبة|مخصص/i.test(t))return 'b-blue';\n    return 'b-blue';}\n  var T={\n    units:function(r){return '<tr><td>'+esc(r.code)+'</td><td>'+esc(r.unit)+'</td><td>'+esc(r.owner)+'</td><td>'+esc(r.priority)+'</td><td><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></td><td>'+esc(r.updated)+'</td></tr>';},\n    zones:function(r){var p=parseInt(r.probability)||0;var c=p>=80?'b-red':(p>=70?'b-yellow':'b-blue');return '<tr><td>'+esc(r.zone)+'</td><td>'+esc(r.indicator)+'</td><td><span class=\"badge '+c+'\">'+esc(r.probability)+'%</span></td><td>'+esc(r.decision)+'</td></tr>';},\n    support:function(r){return '<tr><td>'+esc(r.dest)+'</td><td>'+esc(r.need)+'</td><td>'+esc(r.source)+'</td><td>'+esc(r.deadline)+'</td><td><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></td></tr>';},\n    lessons:function(r){return '<div class=\"lesson\"><div class=\"doc\">📄</div><span>'+esc(r.title)+'</span><span>›</span></div>';},\n    officialVisits:function(r){return '<div class=\"visit\"><div class=\"time\">'+esc(r.time)+'</div><div class=\"vtitle\"><b>'+esc(r.title)+'</b><small>'+esc(r.route)+'</small></div><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></div>';},\n    schoolVisits:function(r){return '<div class=\"visit\"><div class=\"time\">'+esc(r.time)+'</div><div class=\"vtitle\"><b>'+esc(r.school)+'</b><small>'+esc(r.students)+' طالب · '+esc(r.supervisors)+' مشرفين · '+esc(r.hall)+'</small></div><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></div>';},\n    reports:function(r){return '<div class=\"report\"><b>'+esc(r.name)+'</b><p>'+esc(r.desc)+'</p><span class=\"badge '+(r.badge||badge(r.type))+'\">'+esc(r.type)+'</span></div>';}\n  };\n  function num(v){return (v==null||v==='')?'—':v;}\n  function render(){\n    var nodes=document.querySelectorAll('[data-bind]');\n    for(var i=0;i<nodes.length;i++){var el=nodes[i];var k=el.getAttribute('data-bind');var rows=DB[k]||[];var tpl=T[k];if(!tpl)continue;\n      var pre=el.className.indexOf('timeline')>=0?'<div class=\"line\"></div>':'';\n      el.innerHTML=pre+rows.map(tpl).join('');}\n    var ks=document.querySelectorAll('[data-kpi]');\n    for(var j=0;j<ks.length;j++){var e=ks[j];try{var v=Function('DB','return ('+e.getAttribute('data-kpi')+');')(DB);e.textContent=num(v);}catch(err){}}\n  }\n  if(document.readyState!=='loading')render();else document.addEventListener('DOMContentLoaded',render);\n})();<\\/script></body></html>"},{"num":"07","title":"خطة دعم بين المناطق","html":"<!doctype html><html lang=\"ar\" dir=\"rtl\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><title>خطة دعم بين المناطق - نسخة واضحة</title><link href=\"https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap\" rel=\"stylesheet\"><style>\n:root{--bg:#030711;--line:rgba(154,111,255,.25);--line2:rgba(255,255,255,.08);--ink:#f7f3ff;--muted:#aab4cf;--purple:#7B3DFF;--gold:#D7B15E;--green:#25D68B;--red:#FF4D67;--y "lane\"><div class=\"lane-title\">مصادر الدعم الآمنة<small>يسحب منها فقط إذا كانت مستقرة</small></div><div class=\"cards-col\"><div class=\"box source\"><b>المنطقة التجارية</b><p>فائض 14 منظمًا، لا يوجد بلاغ مفتوح</p><span class=\"badge b-green\">مصدر آمن</span></div><div class=\"box source\"><b>نقاط المعلومات</b><p>فائض 8 منظمين، ضغط منخفض</p><span class=\"badge b-green\">مصدر آمن</span></div></div></div><div class=\"engine\">محرك<br>الإسناد<span>يختار المصدر الأفضل حسب الأثر والقيود</span><div class=\"rule\">قاعدة: لا سحب من منطقة حمراء أو منطقة بها بلاغ مفتوح</div></div><div class=\"lane\"><div class=\"lane-title\">مناطق الاحتياج<small>تستقبل الدعم حسب الأولوية</small></div><div class=\"cards-col\"><div class=\"box need\"><b>المواقف الشمالية</b><p>حاجة 12 منظمًا خلال 8 دقائق</p><span class=\"badge b-red\">أولوية فورية</span></div><div class=\"box need\"><b>بوابة المعرض</b><p>حاجة 8 منظمين لتقليل الانتظار</p><span class=\"badge b-yellow\">دعم مطلوب</span></div></div></div></div></div><div class=\"table\"><h3>طلبات الدعم النشطة</h3><table><thead><tr><th>الوجهة</th><th>المطلوب</th><th>المصدر</th><th>المهلة</th><th>الحالة</th></tr></thead><tbody data-bind=\"support\"></tbody></table><div class=\"actions\"><button class=\"btn green\">اعتماد خطة الدعم</button><button class=\"btn ghost\">إرسال للمسؤولين</button><button class=\"btn ghost\">تعديل المصادر</button></div></div></div></main>\n<aside class=\"glass side\"><div class=\"section-title\"><h3>قرار الصفحة</h3><span class=\"badge b-red\">فوري</span></div><div class=\"kpi redline\"><small>الإجراء المقترح</small><b style=\"font-size:19px\">نقل 12 منظمًا إلى المواقف الشمالية</b><em>من المنطقة التجارية خلال 8 دقائق</em></div><p>لا يسمح بالسحب إلا من منطقة مستقرة، ولا يوجد بها بلاغ مفتوح أو نقص تشغيلي.</p><div class=\"actions\"><button class=\"btn\">اعتماد</button><button class=\"btn ghost\">تعديل</button><button class=\"btn ghost\">رفض</button></div><div class=\"section-title\" style=\"margin-top:8px\"><h3>قيود النظام</h3></div><div class=\"row\"><span>لا سحب من منطقة حمراء</span><span class=\"badge b-red\">ممنوع</span></div><div class=\"row\"><span>لا سحب من منطقة بها بلاغ</span><span class=\"badge b-yellow\">تحقق</span></div><div class=\"row\"><span>كل نقل يحتاج دليل</span><span class=\"badge b-blue\">إلزامي</span></div></aside>\n<section class=\"glass bottom\"><div class=\"bar\"><h3>دورة الإسناد</h3><div class=\"steps\"><div class=\"step\"><b>1 طلب</b>منطقة حرجة</div><div class=\"step\"><b>2 تحليل</b>مصادر آمنة</div><div class=\"step\"><b>3 اعتماد</b>غرفة العمليات</div></div></div><div class=\"bar\"><h3>قياس الأثر</h3><div class=\"steps\"><div class=\"step\"><b>قبل</b>ضغط 94%</div><div class=\"step\"><b>بعد متوقع</b>76%</div><div class=\"step\"><b>التحسن</b>-18%</div><div class=\"step\"><b>المدة</b>25د</div></div></div><div class=\"bar\"><h3>إغلاق المهمة</h3><div class=\"steps\"><div class=\"step\"><b>دليل</b>صورة توزيع</div><div class=\"step\"><b>تحديث</b>الكثافة</div><div class=\"step\"><b>اعتماد</b>غرفة العمليات</div></div></div></section>\n</div><script>(function(){\n  var DB=(window.__DB__)||{};\n  function esc(s){return String(s==null?'':s).replace(/[&<>\"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c];});}\n  function badge(t){t=(t||'').toString();\n    if(/حرج|إجراء|تعارض|فوري|متأخ|خطر|أحمر|نقص/.test(t))return 'b-red';\n    if(/متابعة|تأكيد|بلاغ|مراجعة|تجهيز|بانتظار|انتظار|تحذير|قيد/.test(t))return 'b-yellow';\n    if(/مستقر|جاهز|معتمد|ملتزم|ناجح|اكتمل|^تم/.test(t))return 'b-green';\n    if(/نشط|مراقبة|مخصص/i.test(t))return 'b-blue';\n    return 'b-blue';}\n  var T={\n    units:function(r){return '<tr><td>'+esc(r.code)+'</td><td>'+esc(r.unit)+'</td><td>'+esc(r.owner)+'</td><td>'+esc(r.priority)+'</td><td><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></td><td>'+esc(r.updated)+'</td></tr>';},\n    zones:function(r){var p=parseInt(r.probability)||0;var c=p>=80?'b-red':(p>=70?'b-yellow':'b-blue');return '<tr><td>'+esc(r.zone)+'</td><td>'+esc(r.indicator)+'</td><td><span class=\"badge '+c+'\">'+esc(r.probability)+'%</span></td><td>'+esc(r.decision)+'</td></tr>';},\n    support:function(r){return '<tr><td>'+esc(r.dest)+'</td><td>'+esc(r.need)+'</td><td>'+esc(r.source)+'</td><td>'+esc(r.deadline)+'</td><td><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></td></tr>';},\n    lessons:function(r){return '<div class=\"lesson\"><div class=\"doc\">📄</div><span>'+esc(r.title)+'</span><span>›</span></div>';},\n    officialVisits:function(r){return '<div class=\"visit\"><div class=\"time\">'+esc(r.time)+'</div><div class=\"vtitle\"><b>'+esc(r.title)+'</b><small>'+esc(r.route)+'</small></div><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></div>';},\n    schoolVisits:function(r){return '<div class=\"visit\"><div class=\"time\">'+esc(r.time)+'</div><div class=\"vtitle\"><b>'+esc(r.school)+'</b><small>'+esc(r.students)+' طالب · '+esc(r.supervisors)+' مشرفين · '+esc(r.hall)+'</small></div><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></div>';},\n    reports:function(r){return '<div class=\"report\"><b>'+esc(r.name)+'</b><p>'+esc(r.desc)+'</p><span class=\"badge '+(r.badge||badge(r.type))+'\">'+esc(r.type)+'</span></div>';}\n  };\n  function num(v){return (v==null||v==='')?'—':v;}\n  function render(){\n    var nodes=document.querySelectorAll('[data-bind]');\n    for(var i=0;i<nodes.length;i++){var el=nodes[i];var k=el.getAttribute('data-bind');var rows=DB[k]||[];var tpl=T[k];if(!tpl)continue;\n      var pre=el.className.indexOf('timeline')>=0?'<div class=\"line\"></div>':'';\n      el.innerHTML=pre+rows.map(tpl).join('');}\n    var ks=document.querySelectorAll('[data-kpi]');\n    for(var j=0;j<ks.length;j++){var e=ks[j];try{var v=Function('DB','return ('+e.getAttribute('data-kpi')+');')(DB);e.textContent=num(v);}catch(err){}}\n  }\n  if(document.readyState!=='loading')render();else document.addEventListener('DOMContentLoaded',render);\n})();<\\/script></body></html>"},{"num":"08","title":"مركز الإسناد اللحظي","html":"<!doctype html><html lang=\"ar\" dir=\"rtl\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><title>مركز الإسناد اللحظي</title><link href=\"https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap\" rel=\"stylesheet\"><style>\n:root{--line:rgba(154,111,255,.25);--line2:rgba(255,255,255,.08);--ink:#f7f3ff;--muted:#aab4cf;--purple:#7B3DFF;--gold:#D7B15E;--green:#25D68B;--red:#FF4D67;--yellow:#FFD25E;--blue:#4CC9FF;--orange:#ff8b3d}\n*{box-sizing:border-box}body{margin:0;height:100vh;overflow:hidden;background:radial-gradient(circle at 50% -20%,rgba(123,61,255,.20),transparent 32%),linear-gradient(180deg,#030711,#071025);color:var(--ink);font-family:'IBM Plex Sans Arabic',Tahoma,Arial,sans-serif}body:before{content:\"\";position:fixed;inset:0;background:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:38px 38px;pointer-events:none;mask-image:radial-gradient(circle at center,black,transparent 80%)}\n.screen{height:100vh;padding:14px;display:grid;grid-template-columns:310px 1fr 310px;grid-template-rows:74px 1fr 120px;gap:12px}.glass{background:linear-gradient(180deg,rgba(14,26,51,.90),rgba(5,12,27,.90));border:1px solid var(--line2);border-radius:20px;box-shadow:0 22px 70px rgba(0,0,0,.46);backdrop-filter:blur(14px);position:relative;overflow:hidden}.glass:before{content:\"\";position:absolute;inset:0;background:linear-gradient(130deg,rgba(123,61,255,.10),transparent 44%,rgba(76,201,255,.045));pointer-events:none}.top{grid-column:1/4;display:flex;align-items:center;justify-content:space-between;padding:12px 18px}.brand{display:flex;align-items:center;gap:12px}.mark{width:46px;height:50px;border-radius:14px;background:linear-gradient(145deg,#7b3dff,#201057);display:grid;place-items:center;font-weight:900;font-size:21 div class=\"node n2\"><b>تحليل السبب</b>جذر المشكلة وأثرها</div><div class=\"node n3\"><b>إجراء تصحيحي</b>ما تم عمله ميدانيًا</div><div class=\"node n4\"><b>قاعدة مستقبلية</b>منع التكرار لاحقًا</div></div><div class=\"box\"><h3>ملخص الدرس المستفاد</h3><table><tr><td>العنوان</td><td>ازدحام المواقف - مايو 2026</td></tr><tr><td>السبب الجذري</td><td>زيادة غير متوقعة في أعداد الزوار وتداخل أوقات الدخول والخروج.</td></tr><tr><td>الإجراء التصحيحي</td><td>فتح مخرج احتياطي، دعم تنظيمي، إعادة توزيع فرق الإرشاد.</td></tr><tr><td>التوصية</td><td>رفع الطاقة الاستيعابية قبل الفعاليات الكبرى وفحص المسارات.</td></tr><tr><td>التقييم</td><td><span class=\"stars\">★★★★☆</span> 4 من 5</td></tr></table><div class=\"actions\"><button class=\"btn\">اعتماد التوصية</button><button class=\"btn ghost\">تحويل إلى قاعدة</button><button class=\"btn ghost\">تصدير الدرس</button></div></div></div></main>\n<aside class=\"glass side\"><div class=\"section-title\"><h3>قرار الصفحة</h3><span class=\"badge b-green\">تعلم</span></div><div class=\"kpi greenline\"><small>الإجراء المقترح</small><b style=\"font-size:19px\">تحويل درس ازدحام المواقف إلى قاعدة استباقية</b><em>تطبق قبل الذروة القادمة</em></div><p style=\"color:var(--muted);font-size:12px;line-height:1.7\">كل درس يعتمد بعد مراجعة غرفة العمليات ثم يدخل في قواعد الإنذار المبكر والتصعيد والموارد.</p><div class=\"section-title\" style=\"margin-top:8px\"><h3>لماذا المنصة الاستباقية؟</h3></div><div class=\"row\"><span>تنبيه مبكر</span><span class=\"badge b-blue\">قبل المشكلة</span></div><div class=\"row\"><span>قرار أسرع</span><span class=\"badge b-green\">معلومات دقيقة</span></div><div class=\"row\"><span>تصعيد ذكي</span><span class=\"badge b-purple\">حسب الأثر</span></div><div class=\"row\"><span>تقارير موثقة</span><span class=\"badge b-yellow\">تعلم مستمر</span></div></aside>\n<section class=\"bottom\"><div class=\"glass\"><h3>دورة التعلم</h3><div class=\"steps\"><div class=\"step\"><b>1 موقف</b>حدث تشغيلي</div><div class=\"step\"><b>2 تحليل</b>سبب جذري</div><div class=\"step\"><b>3 توصية</b>منع التكرار</div></div></div><div class=\"glass\"><h3>تحويل الدرس إلى نظام</h3><div class=\"steps\"><div class=\"step\"><b>قاعدة إنذار</b>عتبة تشغيلية</div><div class=\"step\"><b>قالب مهمة</b>إجراء جاهز</div><div class=\"step\"><b>دليل مطلوب</b>إثبات تنفيذ</div><div class=\"step\"><b>قياس أثر</b>قبل/بعد</div></div></div><div class=\"glass\"><h3>اعتماد المعرفة</h3><div class=\"steps\"><div class=\"step\"><b>مراجعة</b>غرفة العمليات</div><div class=\"step\"><b>اعتماد</b>مدير المسار</div><div class=\"step\"><b>نشر</b>على الفرق</div></div></div></section></div><script>(function(){\n  var DB=(window.__DB__)||{};\n  function esc(s){return String(s==null?'':s).replace(/[&<>\"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c];});}\n  function badge(t){t=(t||'').toString();\n    if(/حرج|إجراء|تعارض|فوري|متأخ|خطر|أحمر|نقص/.test(t))return 'b-red';\n    if(/متابعة|تأكيد|بلاغ|مراجعة|تجهيز|بانتظار|انتظار|تحذير|قيد/.test(t))return 'b-yellow';\n    if(/مستقر|جاهز|معتمد|ملتزم|ناجح|اكتمل|^تم/.test(t))return 'b-green';\n    if(/نشط|مراقبة|مخصص/i.test(t))return 'b-blue';\n    return 'b-blue';}\n  var T={\n    units:function(r){return '<tr><td>'+esc(r.code)+'</td><td>'+esc(r.unit)+'</td><td>'+esc(r.owner)+'</td><td>'+esc(r.priority)+'</td><td><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></td><td>'+esc(r.updated)+'</td></tr>';},\n    zones:function(r){var p=parseInt(r.probability)||0;var c=p>=80?'b-red':(p>=70?'b-yellow':'b-blue');return '<tr><td>'+esc(r.zone)+'</td><td>'+esc(r.indicator)+'</td><td><span class=\"badge '+c+'\">'+esc(r.probability)+'%</span></td><td>'+esc(r.decision)+'</td></tr>';},\n    support:function(r){return '<tr><td>'+esc(r.dest)+'</td><td>'+esc(r.need)+'</td><td>'+esc(r.source)+'</td><td>'+esc(r.deadline)+'</td><td><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></td></tr>';},\n    lessons:function(r){return '<div class=\"lesson\"><div class=\"doc\">📄</div><span>'+esc(r.title)+'</span><span>›</span></div>';},\n    officialVisits:function(r){return '<div class=\"visit\"><div class=\"time\">'+esc(r.time)+'</div><div class=\"vtitle\"><b>'+esc(r.title)+'</b><small>'+esc(r.route)+'</small></div><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></div>';},\n    schoolVisits:function(r){return '<div class=\"visit\"><div class=\"time\">'+esc(r.time)+'</div><div class=\"vtitle\"><b>'+esc(r.school)+'</b><small>'+esc(r.students)+' طالب · '+esc(r.supervisors)+' مشرفين · '+esc(r.hall)+'</small></div><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></div>';},\n    reports:function(r){return '<div class=\"report\"><b>'+esc(r.name)+'</b><p>'+esc(r.desc)+'</p><span class=\"badge '+(r.badge||badge(r.type))+'\">'+esc(r.type)+'</span></div>';}\n  };\n  function num(v){return (v==null||v==='')?'—':v;}\n  function render(){\n    var nodes=document.querySelectorAll('[data-bind]');\n    for(var i=0;i<nodes.length;i++){var el=nodes[i];var k=el.getAttribute('data-bind');var rows=DB[k]||[];var tpl=T[k];if(!tpl)continue;\n      var pre=el.className.indexOf('timeline')>=0?'<div class=\"line\"></div>':'';\n      el.innerHTML=pre+rows.map(tpl).join('');}\n    var ks=document.querySelectorAll('[data-kpi]');\n    for(var j=0;j<ks.length;j++){var e=ks[j];try{var v=Function('DB','return ('+e.getAttribute('data-kpi')+');')(DB);e.textContent=num(v);}catch(err){}}\n  }\n  if(document.readyState!=='loading')render();else document.addEventListener('DOMContentLoaded',render);\n})();<\\/script></body></html>"},{"num":"11","title":"مركز التصعيد","html":"<!doctype html>\n<html lang=\"ar\" dir=\"rtl\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>مركز التصعيد</title>\n<link href=\"https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap\" rel=\"stylesheet\">\n<style>:root{--bg:#030711;--line:rgba(154,111,255,.25);--line2:rgba( n class=\"glass main\"><div class=\"cards\"><div class=\"kpi goldline\"><small>أقرب زيارة</small><b>16:00</b><em>وفد رسمي - بوابة VIP</em></div><div class=\"kpi blueline\"><small>مرافقون مخصصون</small><b>12</b><em>بروتوكول + عمليات</em></div><div class=\"kpi greenline\"><small>ضيافة جاهزة</small><b>96%</b><em>صالة كبار الشخصيات</em></div><div class=\"kpi yellowline\"><small>مسارات تحتاج تأكيد</small><b>2</b><em>داخل المعرض</em></div></div><div class=\"board\"><div class=\"timeline\" data-bind=\"officialVisits\"></div><div class=\"box\"><h3>تفاصيل الزيارة المحددة</h3><table><tr><td>الزيارة</td><td>زيارة قيادية للمعرض</td></tr><tr><td>وقت الوصول</td><td>16:45</td></tr><tr><td>نقطة الدخول</td><td>بوابة VIP / مدخل كبار الشخصيات</td></tr><tr><td>المسار</td><td>الاستقبال ← جناح الهيئة ← ضيف الشرف ← المسرح</td></tr><tr><td>المسؤول</td><td>مدير البروتوكول + غرفة العمليات</td></tr><tr><td>الحالة</td><td><span class=\"badge b-yellow\">بانتظار تأكيد المرافق</span></td></tr></table><div class=\"actions\"><button class=\"btn green\">اعتماد المسار</button><button class=\"btn ghost\">إرسال للمرافقين</button><button class=\"btn ghost\">فتح مهمة</button></div></div></div></main>\n<aside class=\"glass side\"><div class=\"section-title\"><h3>قرار الصفحة</h3><span class=\"badge b-yellow\">تأكيد</span></div><div class=\"kpi yellowline\"><small>الإجراء المقترح</small><b style=\"font-size:19px\">تأكيد مسار زيارة 16:45 خلال 20 دقيقة</b><em>قبل وصول الوفد</em></div><p style=\"color:var(--muted);font-size:12px;line-height:1.7\">أي زيارة رسمية لا تعتمد إلا بعد تأكيد نقطة الدخول، المرافق، المسار، الضيافة، والتنسيق الأمني.</p><div class=\"section-title\" style=\"margin-top:8px\"><h3>قائمة الجاهزية</h3></div><div class=\"protocol\"><div class=\"protocol-card\"><b>البروتوكول</b>مرافق رئيسي + خطة استقبال</div><div class=\"protocol-card\"><b>الأمن والحركة</b>مسار معتمد وخالٍ من التعارض</div><div class=\"protocol-card\"><b>الضيافة</b>صالة VIP جاهزة وتوقيت الخدمة مؤكد</div><div class=\"protocol-card\"><b>الإعلام</b>نقطة تصوير مصرح بها</div></div></aside>\n<section class=\"bottom\"><div class=\"glass\"><h3>دورة الزيارة</h3><div class=\"steps\"><div class=\"step\"><b>1 جدولة</b>وقت ووفد</div><div class=\"step\"><b>2 اعتماد</b>مسار ومرافق</div><div class=\"step\"><b>3 تنفيذ</b>استقبال وجولة</div></div></div><div class=\"glass\"><h3>نقاط التحكم</h3><div class=\"steps\"><div class=\"step\"><b>دخول</b>بوابة VIP</div><div class=\"step\"><b>استقبال</b>صالة كبار</div><div class=\"step\"><b>جولة</b>مسار معتمد</div><div class=\"step\"><b>خروج</b>توديع موثق</div></div></div><div class=\"glass\"><h3>إغلاق الزيارة</h3><div class=\"steps\"><div class=\"step\"><b>دليل</b>صورة/سجل</div><div class=\"step\"><b>تقرير</b>ملاحظات</div><div class=\"step\"><b>اعتماد</b>البروتوكول</div></div></div></section></div><script>(function(){\n  var DB=(window.__DB__)||{};\n  function esc(s){return String(s==null?'':s).replace(/[&<>\"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c];});}\n  function badge(t){t=(t||'').toString();\n    if(/حرج|إجراء|تعارض|فوري|متأخ|خطر|أحمر|نقص/.test(t))return 'b-red';\n    if(/متابعة|تأكيد|بلاغ|مراجعة|تجهيز|بانتظار|انتظار|تحذير|قيد/.test(t))return 'b-yellow';\n    if(/مستقر|جاهز|معتمد|ملتزم|ناجح|اكتمل|^تم/.test(t))return 'b-green';\n    if(/نشط|مراقبة|مخصص/i.test(t))return 'b-blue';\n    return 'b-blue';}\n  var T={\n    units:function(r){return '<tr><td>'+esc(r.code)+'</td><td>'+esc(r.unit)+'</td><td>'+esc(r.owner)+'</td><td>'+esc(r.priority)+'</td><td><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></td><td>'+esc(r.updated)+'</td></tr>';},\n    zones:function(r){var p=parseInt(r.probability)||0;var c=p>=80?'b-red':(p>=70?'b-yellow':'b-blue');return '<tr><td>'+esc(r.zone)+'</td><td>'+esc(r.indicator)+'</td><td><span class=\"badge '+c+'\">'+esc(r.probability)+'%</span></td><td>'+esc(r.decision)+'</td></tr>';},\n    support:function(r){return '<tr><td>'+esc(r.dest)+'</td><td>'+esc(r.need)+'</td><td>'+esc(r.source)+'</td><td>'+esc(r.deadline)+'</td><td><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></td></tr>';},\n    lessons:function(r){return '<div class=\"lesson\"><div class=\"doc\">📄</div><span>'+esc(r.title)+'</span><span>›</span></div>';},\n    officialVisits:function(r){return '<div class=\"visit\"><div class=\"time\">'+esc(r.time)+'</div><div class=\"vtitle\"><b>'+esc(r.title)+'</b><small>'+esc(r.route)+'</small></div><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></div>';},\n    schoolVisits:function(r){return '<div class=\"visit\"><div class=\"time\">'+esc(r.time)+'</div><div class=\"vtitle\"><b>'+esc(r.school)+'</b><small>'+esc(r.students)+' طالب · '+esc(r.supervisors)+' مشرفين · '+esc(r.hall)+'</small></div><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></div>';},\n    reports:function(r){return '<div class=\"report\"><b>'+esc(r.name)+'</b><p>'+esc(r.desc)+'</p><span class=\"badge '+(r.badge||badge(r.type))+'\">'+esc(r.type)+'</span></div>';}\n  };\n  function num(v){return (v==null||v==='')?'—':v;}\n  function render(){\n    var nodes=document.querySelectorAll('[data-bind]');\n    for(var i=0;i<nodes.length;i++){var el=nodes[i];var k=el.getAttribute('data-bind');var rows=DB[k]||[];var tpl=T[k];if(!tpl)continue;\n      var pre=el.className.indexOf('timeline')>=0?'<div class=\"line\"></div>':'';\n      el.innerHTML=pre+rows.map(tpl).join('');}\n    var ks=document.querySelectorAll('[data-kpi]');\n    for(var j=0;j<ks.length;j++){var e=ks[j];try{var v=Function('DB','return ('+e.getAttribute('data-kpi')+');')(DB);e.textContent=num(v);}catch(err){}}\n  }\n  if(document.readyState!=='loading')render();else document.addEventListener('DOMContentLoaded',render);\n})();<\\/script></body></html>"},{"num":"16","title":"جدول الزيارات المدرسية","html":"<!doctype html><html lang=\"ar\" dir=\"rtl\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><title>جدول الزيارات المدرسية</ ss=\"cards\"><div class=\"kpi greenline\"><small>إعدادات مفعلة</small><b>18</b><em>تعمل</em></div><div class=\"kpi blueline\"><small>تكاملات مرتبطة</small><b>7</b><em>واتساب / Maps / تقارير</em></div><div class=\"kpi yellowline\"><small>تنبيهات نظام</small><b>2</b><em>تحتاج مراجعة</em></div><div class=\"kpi purpleline\"><small>أدوار وصلاحيات</small><b>9</b><em>مستويات وصول</em></div></div><div class=\"board\"><div class=\"box\"><h3>إعدادات التشغيل</h3><div class=\"setting\"><span>التصعيد التلقائي كل 5 دقائق</span><div class=\"switch on\"></div></div><div class=\"setting\"><span>طلب دليل قبل الإغلاق</span><div class=\"switch on\"></div></div><div class=\"setting\"><span>اعتماد غرفة العمليات للإغلاق</span><div class=\"switch on\"></div></div><div class=\"setting\"><span>قياس الأثر بعد التنفيذ</span><div class=\"switch on\"></div></div><div class=\"setting\"><span>إرسال واتساب تلقائي</span><div class=\"switch\"></div></div></div><div class=\"box\"><h3>قواعد التصعيد</h3><table><thead><tr><th>المستوى</th><th>الجهة</th><th>المهلة</th><th>الحالة</th></tr></thead><tbody><tr><td>1</td><td>مسؤول المنطقة</td><td>حسب نوع المشكلة</td><td><span class=\"badge b-green\">مفعل</span></td></tr><tr><td>2</td><td>المشرف المباشر</td><td>5 دقائق</td><td><span class=\"badge b-green\">مفعل</span></td></tr><tr><td>3</td><td>مدير المسار</td><td>5 دقائق</td><td><span class=\"badge b-green\">مفعل</span></td></tr><tr><td>4</td><td>غرفة العمليات</td><td>5 دقائق</td><td><span class=\"badge b-green\">مفعل</span></td></tr><tr><td>5</td><td>مدير المشروع</td><td>5 دقائق</td><td><span class=\"badge b-green\">مفعل</span></td></tr></tbody></table><div class=\"actions\"><button class=\"btn green\">حفظ القواعد</button><button class=\"btn ghost\">إضافة قاعدة</button><button class=\"btn ghost\">اختبار التصعيد</button></div></div><div class=\"box\"><h3>التكاملات</h3><div class=\"integrations\"><div class=\"integration\"><div class=\"ic\">WA</div><div><b>WhatsApp</b><span style=\"display:block;color:var(--muted);font-size:11px\">قناة إشعار للمسؤولين</span></div><span class=\"badge b-yellow\">اختبار</span></div><div class=\"integration\"><div class=\"ic\">GM</div><div><b>Google Maps</b><span style=\"display:block;color:var(--muted);font-size:11px\">خرائط وحالة طرق</span></div><span class=\"badge b-green\">متصل</span></div><div class=\"integration\"><div class=\"ic\">BI</div><div><b>Reports API</b><span style=\"display:block;color:var(--muted);font-size:11px\">PDF / PowerPoint</span></div><span class=\"badge b-green\">متصل</span></div><div class=\"integration\"><div class=\"ic\">LOG</div><div><b>Audit Log</b><span style=\"display:block;color:var(--muted);font-size:11px\">سجل الاعتمادات</span></div><span class=\"badge b-green\">نشط</span></div></div></div></div></main>\n<aside class=\"glass side\"><div class=\"section-title\"><h3>قرار الصفحة</h3><span class=\"badge b-blue\">حفظ</span></div><div class=\"kpi blueline\"><small>الإجراء المقترح</small><b style=\"font-size:19px\">اختبار واتساب قبل تفعيل الإرسال التلقائي</b><em>لضمان وصول التنبيهات</em></div><p style=\"color:var(--muted);font-size:12px;line-height:1.7\">لا يتم تفعيل الإرسال التلقائي إلا بعد اختبار القنوات وتوثيق نجاح الإرسال في سجل التدقيق.</p><div class=\"actions\"><button class=\"btn green\">تشغيل الاختبار</button><button class=\"btn ghost\">حفظ الإعدادات</button></div><div class=\"section-title\" style=\"margin-top:8px\"><h3>تنبيهات النظام</h3></div><div class=\"row\"><span>اختبار قناة واتساب مطلوب</span><span class=\"badge b-yellow\">مراجعة</span></div><div class=\"row\"><span>تحديث مفتاح Google Maps</span><span class=\"badge b-blue\">قريب</span></div><div class=\"row\"><span>نسخة احتياطية مكتملة</span><span class=\"badge b-green\">ناجح</span></div></aside>\n<section class=\"bottom\"><div class=\"glass\"><h3>حوكمة الإعدادات</h3><div class=\"steps\"><div class=\"step\"><b>1 تعديل</b>من مدير النظام</div><div class=\"step\"><b>2 اختبار</b>قبل التفعيل</div><div class=\"step\"><b>3 حفظ</b>في السجل</div></div></div> :#89ddff}.b-gold{background:rgba(215,177,94,.18);color:#f5d992}.b-purple{background:rgba(123,61,255,.18);color:#d2c2ff}.row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:9px 10px;border:1px solid rgba(255,255,255,.075);border-radius:13px;background:rgba(255,255,255,.032);font-size:12px}.main{padding:12px;display:grid;grid-template-rows:170px 1fr;gap:12px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.board{display:grid;grid-template-columns:1.15fr .85fr;gap:12px;min-height:0}.box{padding:14px}.box h3{margin:0 0 10px;font-size:15px}.chart-card{position:relative;border-radius:18px;background:radial-gradient(circle at 50% 46%,rgba(123,61,255,.20),transparent 38%),linear-gradient(135deg,#071226,#040814);border:1px solid rgba(154,111,255,.20);overflow:hidden;padding:18px;min-height:430px}.chart-card:before{content:\"\";position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:30px 30px}.report-grid{position:relative;z-index:2;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.report{border:1px solid rgba(255,255,255,.09);border-radius:16px;background:rgba(255,255,255,.04);padding:12px;min-height:104px}.report b{display:block;font-size:15px}.report p{margin:6px 0 10px;color:var(--muted);font-size:11px;line-height:1.5}.chart{position:relative;z-index:2;margin-top:14px;height:210px;border:1px solid rgba(255,255,255,.08);border-radius:16px;background:rgba(255,255,255,.025);padding:16px}.bars{height:100%;display:flex;align-items:end;gap:18px;justify-content:center}.barx{width:42px;border-radius:12px 12px 4px 4px;background:linear-gradient(180deg,var(--purple),#25105b);position:relative;box-shadow:0 0 24px rgba(123,61,255,.25)}.barx span{position:absolute;top:-24px;right:50%;transform:translateX(50%);font-weight:900;color:#d8caff;font-size:12px}.barx small{position:absolute;bottom:-24px;right:50%;transform:translateX(50%);white-space:nowrap;color:var(--muted);font-size:10px}table{width:100%;border-collapse:separate;border-spacing:0 8px}td,th{font-size:12px}th{color:#c4b1ff;text-align:right;padding:0 8px}td{background:rgba(255,255,255,.035);border-top:1px solid rgba(255,255,255,.07);border-bottom:1px solid rgba(255,255,255,.07);padding:8px}td:first-child{border-right:1px solid rgba(255,255,255,.07);border-radius:0 10px 10px 0}td:last-child{border-left:1px solid rgba(255,255,255,.07);border-radius:10px 0 0 10px}.bottom{grid-column:1/4;display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:12px}.bottom .glass{padding:13px 15px}.bottom h3{margin:0 0 7px;font-size:14px}.steps{display:flex;gap:8px}.step{flex:1;border:1px solid var(--line2);border-radius:12px;padding:8px;background:rgba(255,255,255,.032);font-size:11px}.step b{display:block;color:var(--gold);font-size:13px}.btn{border:0;border-radius:12px;padding:9px 12px;background:linear-gradient(135deg,var(--purple),#4d1ab9);color:white;font-family:inherit;font-weight:900;font-size:12px;cursor:pointer}.btn.green{background:linear-gradient(135deg,#0d9e66,#25d68b)}.btn.ghost{background:rgba(255,255,255,.045);border:1px solid var(--line2);color:#dde4ff}.actions{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:12px;line-height:1.7}@media(max-width:1200px){body{overflow:auto}.screen{height:auto;grid-template-columns:1fr;grid-template-rows:auto}.top,.bottom{grid-column:auto}.bottom,.board,.cards,.report-grid{grid-template-columns:1fr}.main{min-height:1100px}}\n</style></head><body><div class=\"screen\"><header class=\"glass top\"><div class=\"brand\"><div class=\"mark\">P</div><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAALYAAABQCAYAAAC07Y+bAAAjQElEQVR42u19eZhdVZXvb+29z3BvVWUkwZAQCNDNs0BlHhLoVGxbBRQUvVGTmqAlCG3e61a721abW1exbdtue9Cm20BCUkOwc51QHg6oSQFVmeXzAekGGRIEAiFTTfeeYe+93h/n3qSSVCVVmUjIXd93v3w5dYZ91v6dvX5r7b3WJlTkpJBsNiuAOrFp0xucz2csQFzRyvBCFRWcaMIEENfXd012pPvnYPyGlOhesuTSV4c6r6KvoUVVVHBiSS ر والحوكمة</h2><p>توليد التقارير التنفيذية، متابعة الامتثال، وحفظ سجل القرار والأدلة</p></div><div class=\"now\"><div class=\"pill\">تقارير جاهزة <b data-kpi=\"DB.reports.length\">6</b></div><div class=\"pill\">اعتمادات <b>37</b></div><div class=\"pill\">امتثال <b>88%</b></div></div></header>\n<aside class=\"glass side\"><div class=\"section-title\"><h3>مركز التقارير</h3><span class=\"badge b-gold\">PDF / PPT</span></div><div class=\"kpi greenline\"><small>تقارير جاهزة</small><b>6</b><em>PDF و PowerPoint</em></div><div class=\"kpi blueline\"><small>تقارير مجدولة</small><b>4</b><em>اليوم</em></div><div class=\"kpi yellowline\"><small>بانتظار اعتماد</small><b>2</b><em>من غرفة العمليات</em></div><div class=\"kpi greenline\"><small>آخر تصدير</small><b>قبل 12د</b><em>ناجح</em></div><div class=\"section-title\"><h3>إجراءات سريعة</h3></div><div class=\"actions\"><button class=\"btn\">تقرير جديد</button><button class=\"btn ghost\">جدولة تقرير</button><button class=\"btn ghost\">مشاركة تقرير</button><button class=\"btn ghost\">طلب سجل</button></div></aside>\n<main class=\"glass main\"><div class=\"cards\"><div class=\"kpi blueline\"><small>إجمالي المهام المنجزة</small><b>58</b><em>↑ 12% عن الفترة السابقة</em></div><div class=\"kpi greenline\"><small>تحت المراجعة</small><b>41</b><em>بانتظار اعتماد</em></div><div class=\"kpi yellowline\"><small>متأخرة عن الموعد</small><b>18</b><em>تحتاج متابعة</em></div><div class=\"kpi purpleline\"><small>مستوى المخاطر العام</small><b>متوسط</b><em>قابل للسيطرة</em></div></div><div class=\"board\"><div class=\"chart-card\"><div class=\"report-grid\" data-bind=\"reports\"></div><div class=\"chart\"><div class=\"bars\"><div class=\"barx\" style=\"height:82%\"><span>29</span><small>العمليات</small></div><div class=\"barx\" style=\"height:66%\"><span>23</span><small>الحشود</small></div><div class=\"barx\" style=\"height:48%\"><span>15</span><small>الخدمات</small></div><div class=\"barx\" style=\"height:36%\"><span>9</span><small>البروتوكول</small></div><div class=\"barx\" style=\"height:28%\"><span>7</span><small>التقنية</small></div></div></div></div><div class=\"box\"><h3>الضوابط والحوكمة</h3><table><tr><td>مركز الأدلة</td><td>1,248 ملف</td><td><span class=\"badge b-blue\">نشط</span></td></tr><tr><td>تم التحقق منها</td><td>896 ملف</td><td><span class=\"badge b-green\">معتمد</span></td></tr><tr><td>قيد المراجعة</td><td>128 ملف</td><td><span class=\"badge b-yellow\">مراجعة</span></td></tr><tr><td>الضوابط المطبقة</td><td>41 ضبط</td><td><span class=\"badge b-green\">ملتزم</span></td></tr><tr><td>السياسات النشطة</td><td>24 سياسة</td><td><span class=\"badge b-purple\">مفعلة</span></td></tr></table><div class=\"actions\"><button class=\"btn green\">اعتماد التقرير اليومي</button><button class=\"btn ghost\">تصدير PDF</button><button class=\"btn ghost\">تصدير PPT</button></div></div></div></main>\n<aside class=\"glass side\"><div class=\"section-title\"><h3>قرار الصفحة</h3><span class=\"badge b-gold\">تقرير</span></div><div class=\"kpi goldline\"><small>الإجراء المقترح</small><b style=\"font-size:19px\">اعتماد التقرير اليومي وتصديره PDF وPPT</b><em>بعد مراجعة الأدلة الناقصة</em></div><p style=\"color:var(--muted);font-size:12px;line-height:1.7\">التقرير لا يصدر للقيادة إلا بعد اكتمال الأدلة الحرجة أو توضيح سبب النقص في سجل الحوكمة.</p><div class=\"section-title\" style=\"margin-top:8px\"><h3>نواقص قبل التصدير</h3></div><div class=\"row\"><span>3 أدلة إغلاق ناقصة</span><span class=\"badge b-red\">حرج</span></div><div class=\"row\"><span>اعتمادان بانتظار غرفة العمليات</span><span class=\"badge b-yellow\">مراجعة</span></div><div class=\"row\"><span>ملخص المخاطر محدث</span><span class=\"badge b-green\">جاهز</span></div></aside>\n<section class=\"bottom\"><div class=\"glass\"><h3>دورة التقرير</h3><div class=\"steps\"><div class=\"step\"><b>1 جمع</b>بيانات حية</div><div class=\"step\"><b>2 تحقق</b>أدلة ومؤشرات</div><div class=\"step\"><b>3 اعتماد</b>غرفة العمليات</div></div></div><div class=\"glass\"><h3>مكونات التقرير</h3><div class=\"steps\"><div class=\"step\"><b>مؤشرات</b>KPI</div><div class=\"step\"><b>قرارات</b>معتمدة</div><div class=\"step\"><b>مخاطر</b>وتصعيد</div><div class=\"step\"><b>أدلة</b>إغلاق</div></div></div><div class=\"glass\"><h3>الصيغ المعتمدة</h3><div class=\"steps\"><div class=\"step\"><b>PDF</b>للطباعة</div><div class=\"step\"><b>PPT</b>للعرض</div><div class=\"step\"><b>سجل</b>للأرشفة</div></div></div></section></div><script>(function(){\n  var DB=(window.__DB__)||{};\n  function esc(s){return String(s==null?'':s).replace(/[&<>\"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c];});}\n  function badge(t){t=(t||'').toString();\n    if(/حرج|إجراء|تعارض|فوري|متأخ|خطر|أحمر|نقص/.test(t))return 'b-red';\n    if(/متابعة|تأكيد|بلاغ|مراجعة|تجهيز|بانتظار|انتظار|تحذير|قيد/.test(t))return 'b-yellow';\n    if(/مستقر|جاهز|معتمد|ملتزم|ناجح|اكتمل|^تم/.test(t))return 'b-green';\n    if(/نشط|مراقبة|مخصص/i.test(t))return 'b-blue';\n    return 'b-blue';}\n  var T={\n    units:function(r){return '<tr><td>'+esc(r.code)+'</td><td>'+esc(r.unit)+'</td><td>'+esc(r.owner)+'</td><td>'+esc(r.priority)+'</td><td><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></td><td>'+esc(r.updated)+'</td></tr>';},\n    zones:function(r){var p=parseInt(r.probability)||0;var c=p>=80?'b-red':(p>=70?'b-yellow':'b-blue');return '<tr><td>'+esc(r.zone)+'</td><td>'+esc(r.indicator)+'</td><td><span class=\"badge '+c+'\">'+esc(r.probability)+'%</span></td><td>'+esc(r.decision)+'</td></tr>';},\n    support:function(r){return '<tr><td>'+esc(r.dest)+'</td><td>'+esc(r.need)+'</td><td>'+esc(r.source)+'</td><td>'+esc(r.deadline)+'</td><td><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></td></tr>';},\n    lessons:function(r){return '<div class=\"lesson\"><div class=\"doc\">📄</div><span>'+esc(r.title)+'</span><span>›</span></div>';},\n    officialVisits:function(r){return '<div class=\"visit\"><div class=\"time\">'+esc(r.time)+'</div><div class=\"vtitle\"><b>'+esc(r.title)+'</b><small>'+esc(r.route)+'</small></div><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></div>';},\n    schoolVisits:function(r){return '<div class=\"visit\"><div class=\"time\">'+esc(r.time)+'</div><div class=\"vtitle\"><b>'+esc(r.school)+'</b><small>'+esc(r.students)+' طالب · '+esc(r.supervisors)+' مشرفين · '+esc(r.hall)+'</small></div><span class=\"badge '+badge(r.status)+'\">'+esc(r.status)+'</span></div>';},\n    reports:function(r){return '<div class=\"report\"><b>'+esc(r.name)+'</b><p>'+esc(r.desc)+'</p><span class=\"badge '+(r.badge||badge(r.type))+'\">'+esc(r.type)+'</span></div>';}\n  };\n  function num(v){return (v==null||v==='')?'—':v;}\n  function render(){\n    var nodes=document.querySelectorAll('[data-bind]');\n    for(var i=0;i<nodes.length;i++){var el=nodes[i];var k=el.getAttribute('data-bind');var rows=DB[k]||[];var tpl=T[k];if(!tpl)continue;\n      var pre=el.className.indexOf('timeline')>=0?'<div class=\"line\"></div>':'';\n      el.innerHTML=pre+rows.map(tpl).join('');}\n    var ks=document.querySelectorAll('[data-kpi]');\n    for(var j=0;j<ks.length;j++){var e=ks[j];try{var v=Function('DB','return ('+e.getAttribute('data-kpi')+');')(DB);e.textContent=num(v);}catch(err){}}\n  }\n  if(document.readyState!=='loading')render();else document.addEventListener('DOMContentLoaded',render);\n})();<\\/script></body></html>"},{"num":"19","title":"صفحة الدخول والصلاحيات","html":"<!doctype html><html lang=\"ar\" dir=\"rtl\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><title>صفحة الدخول والصلاحيات</title><link href=\"https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap\" rel=\"stylesheet\"><style>\n:root{--line:rgba(154,111,255,.25);--line2:rgba(255,255,255,.08);--ink:#f7f3ff;--muted:#aab4cf;--purple:#7B3DFF;--gold:#D7B15E;--green:#25D68B;--red:#FF4D67;--yellow:#FFD25E;--blue:#4CC9FF;--orange:#ff8b3d}\n*{box-sizing:border-box}body{margin:0;height:100vh;overflow:hidden;background:radial-gradient(circle at 50% -20%,rgba(123,61,255,.20),transparent 32%),linear-gradient(180deg,#030711,#071025);color:var(--ink);font-family:'IBM Plex Sans Arabic',Tahoma,Arial,sans-serif}body:before{content:\"\";position:fixed;inset:0;background:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:38px 38px;pointer-events:none;mask-image:radial-gradient(circle at center,black,transparent 80%)}.screen{height:100vh;padding:14px;display:grid;grid-template-columns:330px 1fr 330px;grid-template-rows:74px 1fr 120px;gap:12px}.glass{background:linear-gradient(180deg,rgba(14,26,51,.90),rgba(5,12,27,.90));border:1px solid var(--line2);border-radius:20px;box-shadow:0 22px 70px rgba(0,0,0,.46);backdrop-filter:blur(14px);position:relative;overflow:hidden}.glass:before{content:\"\";position:absolute;inset:0;background:linear-gradient(130deg,rgba(123,61,255,.10),transparent 44%,rgba(76,201,255,.045));pointer-events:none}.top{grid-column:1/4;display:flex;align-items:center;justify-content:space-between;padding:12px 18px}.brand{display:flex;align-items:center;gap:12px}.mark{width:46px;height:50px;border-radius:14px;background:linear-gradient(145deg,#7b3dff,#201057);display:grid;place-items:center;font-weight:900;font-size:21px;box-shadow:0 0 28px rgba(123,61,255,.38)}.brand h1{margin:0;font-size:20px}.brand small{display:block;color:var(--muted);font-size:11px}.headline{text-align:center}.headline h2{font-size:30px;margin:0;line-height:1;font-weight:900}.headline p{margin:7px 0 0;color:var(--muted);font-size:13px}.now{display:flex;gap:8px}.pill{background:rgba(255,255,255,.045);border:1px solid var(--line2);border-radius:14px;padding:8px 11px;font-size:12px;color:var(--muted)}.pill b{color:var(--ink)}.side{padding:14px;display:flex;flex-direction:column;gap:10px}.section-title{display:flex;align-items:center;justify-content:space-be lor:white;font-family:inherit;font-weight:900;font-size:12px;cursor:pointer;text-align:center}.btn.green{background:linear-gradient(135deg,#0d9e66,#25d68b)}.btn.ghost{background:rgba(255,255,255,.045);border:1px solid var(--line2);color:#dde4ff}.actions{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:12px;line-height:1.7}.roles{display:grid;gap:10px}.role{display:grid;grid-template-columns:48px 1fr auto;gap:10px;align-items:center;padding:11px;border:1px solid rgba(255,255,255,.075);border-radius:15px;background:rgba(255,255,255,.032);font-size:12px}.icon{width:42px;height:42px;border-radius:14px;background:linear-gradient(145deg,#7b3dff,#25105b);display:grid;place-items:center;font-size:18px}.role b{display:block}.role small{display:block;color:var(--muted);margin-top:2px}.permissions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}.perm{border:1px solid rgba(255,255,255,.075);border-radius:14px;padding:11px;background:rgba(255,255,255,.032);font-size:12px}.perm b{display:block;color:var(--gold);font-size:13px}.bottom{grid-column:1/4;display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:12px}.bottom .glass{padding:13px 15px}.bottom h3{margin:0 0 7px;font-size:14px}.steps{display:flex;gap:8px}.step{flex:1;border:1px solid var(--line2);border-radius:12px;padding:8px;background:rgba(255,255,255,.032);font-size:11px}.step b{display:block;color:var(--gold);font-size:13px}@media(max-width:1200px){body{overflow:auto}.screen{height:auto;grid-template-columns:1fr;grid-template-rows:auto}.top,.bottom{grid-column:auto}.bottom,.main,.permissions{grid-template-columns:1fr}.main{min-height:900px}}\n</style></head><body><div class=\"screen\"><header class=\"glass top\"><div class=\"brand\"><div class=\"mark\">P</div><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAALYAAABQCAYAAAC07Y+bAAAjQElEQVR42u19eZhdVZXvb+29z3BvVWUkwZAQCNDNs0BlHhLoVGxbBRQUvVGTmqAlCG3e61a721abW1exbdtue9Cm20BCUkOwc51QHg6oSQFVmeXzAekGGRIEAiFTTfeeYe+93h/n3qSSVCVVm
